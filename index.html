<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>RE Fraction Mastery</title>

<!-- PWA: proper iPhone home screen experience -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<style>
/* ── Reset ───────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{font-family:DM Sans,sans-serif;background:#F5F0E8;color:#1A1A1A;font-size:15px;height:100%;height:-webkit-fill-available;overflow:hidden}

/* ── Layout ──────────────────────────────────────── */
#app{max-width:560px;margin:0 auto;height:100%;height:-webkit-fill-available;display:flex;flex-direction:column;position:relative;overflow:hidden}
#screen-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:90px}
::-webkit-scrollbar{display:none}

/* ── Nav ─────────────────────────────────────────── */
#nav{display:flex;background:#1C1812;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;border:none;background:transparent;color:#888;padding:10px 4px 14px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border-top:2px solid transparent;transition:color .2s,border-color .2s;font-family:DM Sans,sans-serif}
.nav-btn.active{color:#F5C842;border-top-color:#F5C842}
.nav-btn span.icon{font-size:18px;line-height:1}
.nav-btn span.lbl{font-size:8px;letter-spacing:1px;text-transform:uppercase}

/* ── Screens ─────────────────────────────────────── */
.screen{display:none;padding:20px 16px 20px}
.screen.active{display:block}

/* ── Cards ───────────────────────────────────────── */
.card{background:#fff;border:1px solid #E2D9C8;border-radius:12px;margin-bottom:10px}
.card-alt{background:#F9F6F0}

/* ── Buttons ─────────────────────────────────────── */
.btn{width:100%;padding:13px;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:DM Sans,sans-serif;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.85}
.btn-dark{background:#1C1812;color:#fff}
.btn-ghost{background:transparent;border:1px solid #E2D9C8;color:#777}

/* ── Inputs ──────────────────────────────────────── */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.field input{width:100%;padding:10px 12px;border:1px solid #E2D9C8;border-radius:8px;font-size:15px;color:#1A1A1A;background:#fff;font-family:DM Sans,sans-serif;-webkit-appearance:none}
.field input:focus{outline:none;border-color:#A67C2E}
.field .hint{font-size:11px;color:#999;margin-top:3px}

/* ── Badges ──────────────────────────────────────── */
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 9px;border-radius:10px}
.badge-good{color:#166534;background:#DCFCE7}
.badge-warn{color:#854D0E;background:#FEF9C3}
.badge-danger{color:#991B1B;background:#FEE2E2}
.badge-info{color:#1E3A5F;background:#DBEAFE}

/* ── Section labels ──────────────────────────────── */
.section-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px}

/* ── Flip card ───────────────────────────────────── */
.flip-wrap{perspective:1000px;margin-bottom:14px}
.flip-inner{transition:transform .5s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;position:relative;height:170px}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-face{backface-visibility:hidden;-webkit-backface-visibility:hidden;position:absolute;inset:0;border-radius:10px;padding:16px;display:flex;flex-direction:column;justify-content:space-between}
.flip-back-face{transform:rotateY(180deg);background:#F0F4F8}
.flip-btn{align-self:flex-end;font-size:11px;font-weight:600;font-family:DM Sans,sans-serif;padding:5px 14px;border-radius:20px;cursor:pointer}

/* ── Expandable ──────────────────────────────────── */
.expander{border:1px solid #E2D9C8;border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fff}
.expander-head{padding:13px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;-webkit-user-select:none}
.expander-head:active{background:#F9F6F0}
.expander-arrow{font-size:16px;font-weight:700;transition:transform .25s;display:inline-block;color:#999}
.expander.open .expander-arrow{transform:rotate(180deg)}
.expander-body{display:none;border-top:1px solid #EDE5D8;padding:14px}
.expander.open .expander-body{display:block}

/* ── Result row ──────────────────────────────────── */
.result-row{background:#fff;border:1px solid #E2D9C8;border-radius:10px;margin-bottom:8px;overflow:hidden}
.result-row-inner{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;align-items:center;padding:12px 14px}
.result-label{font-size:13px;font-weight:600;color:#1A1A1A}
.result-num{text-align:center}
.result-num .lbl{font-size:10px;color:#999;margin-bottom:2px}
.result-num .val{font-size:18px;font-weight:700;color:#1A1A1A}
.result-inv{text-align:center;border-radius:8px;padding:6px 4px}
.result-inv .lbl{font-size:10px;font-weight:600;margin-bottom:2px}
.result-inv .val{font-size:18px;font-weight:700}
.result-note{font-size:11px;color:#666;padding:8px 14px;background:#F9F6F0;border-top:1px solid #EDE5D8}

/* ── Animations ──────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease forwards}

/* ── Calc results ────────────────────────────────── */
.calc-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.calc-box{border-radius:8px;padding:12px;text-align:center;border:2px solid}
.calc-box .lbl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.calc-box .num{font-size:26px;font-weight:700;line-height:1.1}
.calc-box .sub{font-size:11px;color:#999;margin-top:2px}
.calc-full{grid-column:span 2;background:#F9F6F0;border:1px solid #E2D9C8;border-radius:8px;padding:10px;text-align:center}
.calc-full span{font-size:12px;color:#666}
.calc-full strong{font-size:14px;font-weight:700;color:#1A1A1A}

/* ── Tab switcher ────────────────────────────────── */
.tab-row{display:flex;background:#fff;border:1px solid #E2D9C8;border-radius:10px;margin-bottom:18px;overflow:hidden}
.tab-btn{flex:1;padding:12px;background:transparent;border:none;font-size:13px;font-weight:600;color:#999;font-family:DM Sans,sans-serif;cursor:pointer;transition:all .2s}
.tab-btn.active{background:#1C1812;color:#fff}

/* ── Hero card ───────────────────────────────────── */
.hero{background:#1C1812;border-radius:16px;padding:26px 20px 22px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;border-radius:50%;background:rgba(245,200,66,0.06)}
.hero .eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#F5C842;margin-bottom:10px;opacity:.8}
.hero h1{font-family:Playfair Display,serif;font-size:28px;font-weight:700;color:#F5F0E8;line-height:1.2;margin-bottom:8px}
.hero p{font-size:13px;color:rgba(245,240,232,.55);line-height:1.7}

/* ── Home metric tiles ───────────────────────────── */
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.tile{background:#fff;border:1px solid #E2D9C8;border-radius:10px;padding:12px;cursor:pointer}
.tile:active{background:#F9F6F0}
.tile .house-tag{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.tile .name{font-size:13px;font-weight:600;color:#1A1A1A;line-height:1.3}
.tile .formula{font-size:11px;color:#999;margin-top:3px}

/* ── Filter pills ────────────────────────────────── */
.pill-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px}
.pill-row::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid #E2D9C8;background:#fff;color:#555;cursor:pointer;font-family:DM Sans,sans-serif;transition:all .2s}
.pill.active{color:#fff;border-color:transparent}

/* ── Search ──────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:12px}
.search-input{width:100%;padding:10px 36px 10px 36px;border:1.5px solid #E2D9C8;border-radius:10px;font-size:14px;color:#1A1A1A;background:#fff;font-family:DM Sans,sans-serif;-webkit-appearance:none}
.search-input:focus{outline:none;border-color:#A67C2E}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:#999;pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;border:none;font-size:14px;color:#999;cursor:pointer;padding:4px;font-family:DM Sans,sans-serif}
.search-empty{text-align:center;padding:36px 16px;color:#999;font-size:13px}

/* ── Mastery ─────────────────────────────────────── */
.mastery-grid{display:flex;flex-wrap:wrap;gap:5px;padding:8px 0 4px}
.mastery-legend{display:flex;gap:12px;padding:2px 0 0}
.mastery-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#777}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:#fff;border:1px solid #E2D9C8;border-radius:8px;padding:10px;text-align:center}
.stat-box .sval{font-size:20px;font-weight:700;color:#1A1A1A;line-height:1}
.stat-box .slbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#999;margin-top:3px}

/* ── Favorites ───────────────────────────────────── */
.fav-btn{background:transparent;border:none;font-size:16px;cursor:pointer;padding:2px 4px;line-height:1;flex-shrink:0;color:#DDD;transition:color .15s}
.fav-btn.active{color:#F5C842}


/* ── Global nav history arrows ─── */
#nav-history{position:fixed;bottom:calc(58px + env(safe-area-inset-bottom));left:0;right:0;display:flex;justify-content:space-between;padding:0 8px;pointer-events:none;z-index:300;}
.nav-hist-btn{width:36px;height:36px;border-radius:50%;background:rgba(28,24,18,0.75);border:1px solid rgba(201,168,76,0.2);color:#F5C842;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:all;transition:opacity .2s;backdrop-filter:blur(4px);font-family:DM Sans,sans-serif;}
.nav-hist-btn:disabled{opacity:0.2;pointer-events:none;}
.nav-hist-btn:active{background:rgba(28,24,18,0.95);}

/* ── Audio overlay ───────────────────────────────── */
#audio-toggle{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom));right:14px;width:40px;height:40px;border-radius:50%;background:#1C1812;border:2px solid rgba(245,200,66,.25);color:#888;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.2);font-family:DM Sans,sans-serif;transition:all .2s}
#audio-toggle.active{color:#F5C842;border-color:#F5C842;background:#2A2218}
.audio-prompt{display:none;background:#FFF8EC;border:1px solid #D4A84C60;border-left:3px solid #A67C2E;border-radius:0 6px 6px 0;padding:7px 11px;margin-bottom:10px;font-size:10px;color:#A67C2E;font-weight:700;letter-spacing:.5px;text-transform:uppercase;line-height:1.4}
body.audio-mode .audio-prompt{display:block}
.audio-flip-hint{display:none;font-size:10px;color:#A67C2E;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:4px}
body.audio-mode .audio-flip-hint{display:block}
</style>
</head>
<body>
<div id="app">
  <div id="screen-wrap">
    <div id="s-home"     class="screen active"></div>
    <div id="s-library"  class="screen"></div>
    <div id="s-calc"     class="screen"></div>
    <div id="s-blocks"   class="screen"></div>
    <div id="s-practice" class="screen"></div>
    <div id="s-quick"    class="screen"></div>
    <div id="s-game"     class="screen"></div>
    <div id="s-deal"     class="screen"></div>
  </div>
  <nav id="nav">
    <button class="nav-btn active" data-screen="home">    <span class="icon">⌂</span><span class="lbl">Home</span></button>
    <button class="nav-btn"        data-screen="library"> <span class="icon">≡</span><span class="lbl">Metrics</span></button>
    <button class="nav-btn"        data-screen="calc">    <span class="icon">◈</span><span class="lbl">Quick Calc</span></button>
    <button class="nav-btn"        data-screen="blocks">  <span class="icon">⬡</span><span class="lbl">Blocks</span></button>
    <button class="nav-btn"        data-screen="practice"><span class="icon">✦</span><span class="lbl">Practice</span></button>
    <button class="nav-btn"        data-screen="quick">   <span class="icon">◇</span><span class="lbl">Ref</span></button>
    <button class="nav-btn"        data-screen="game">    <span class="icon">⚡</span><span class="lbl">Games</span></button>

  </nav>
</div>

<div id="nav-history">
  <button class="nav-hist-btn" id="nav-back" disabled onclick="navBack()">‹</button>
  <button class="nav-hist-btn" id="nav-fwd"  disabled onclick="navFwd()">›</button>
</div>

<!-- Audio Guide Mode toggle -->
<button id="audio-toggle" onclick="toggleAudioMode()" title="Toggle Audio Guide Mode">🎧</button>

<script>
// ═══════════════════════════════════════════════
// STORE  -  localStorage persistence (Version 1.1)
// Key systems: scores, streaks, per-metric mastery, favorites, audioMode
// ═══════════════════════════════════════════════
const STORE = {
  KEY: 're-mastery-v1',
  get() {
    try { const r=localStorage.getItem(this.KEY); return r?{...this.defaults(),...JSON.parse(r)}:this.defaults(); }
    catch(e){ return this.defaults(); }
  },
  save(d){ try{localStorage.setItem(this.KEY,JSON.stringify(d));}catch(e){} },
  defaults(){ return {scores:{total:0,correct:0},streak:{current:0,best:0},metrics:{},favorites:[],audioMode:false,gameScores:{},onboardingSeen:false}; },

  // Called after every practice answer. metricId can be null for non-metric questions.
  recordAnswer(metricId, correct) {
    const d = this.get();
    if (metricId) {
      if (!d.metrics[metricId]) d.metrics[metricId]={seen:0,correct:0,history:[]};
      const m = d.metrics[metricId];
      m.seen++; if(correct) m.correct++;
      m.history=[...(m.history||[]).slice(-9), correct?1:0];
      m.lastSeen=Date.now();
    }
    d.scores.total++; if(correct){ d.scores.correct++; d.streak.current++; if(d.streak.current>d.streak.best) d.streak.best=d.streak.current; } else { d.streak.current=0; }
    this.save(d); return d;
  },

  // Returns 0-1 mastery score from recent history
  getMastery(id) {
    const m = this.get().metrics[id];
    if (!m||m.seen===0) return null;
    const h = m.history||[];
    if (h.length<3) return m.correct/m.seen;
    return h.slice(-5).reduce((a,b)=>a+b,0)/Math.min(h.slice(-5).length,5);
  },

  // Returns 'unseen'|'needs-work'|'learning'|'mastered'
  getMasteryLevel(id) {
    const s = this.getMastery(id);
    if (s===null) return 'unseen';
    if (s>=0.8) return 'mastered';
    if (s>=0.5) return 'learning';
    return 'needs-work';
  },

  getMasteryColor(id) {
    return {'unseen':'#E2D9C8','needs-work':'#FCA5A5','learning':'#FDE68A','mastered':'#6EE7B7'}[this.getMasteryLevel(id)]||'#E2D9C8';
  },

  getMasteryLabel(id) {
    return {'unseen':'Not yet practiced','needs-work':'Needs Work','learning':'Learning','mastered':'Mastered'}[this.getMasteryLevel(id)]||'';
  },

  toggleFavorite(id) {
    const d=this.get(); const i=d.favorites.indexOf(id);
    if(i>=0) d.favorites.splice(i,1); else d.favorites.push(id);
    this.save(d); return d.favorites.includes(id);
  },
  isFavorite(id){ return this.get().favorites.includes(id); },
  getAudioMode(){ return this.get().audioMode; },
  setAudioMode(v){ const d=this.get(); d.audioMode=v; this.save(d); },
  resetAll(){ try{localStorage.removeItem(this.KEY);}catch(e){} },

  // Calculator persistence
  CALC_KEY: 're-calc-v1',
  saveCalcCurrent(cv){ try{localStorage.setItem(this.CALC_KEY+'-current', JSON.stringify(cv));}catch(e){} },
  loadCalcCurrent(defaults){
    try{ const r=localStorage.getItem(this.CALC_KEY+'-current'); return r?{...defaults,...JSON.parse(r)}:defaults; }
    catch(e){ return defaults; }
  },
  saveCalcSlot(idx, name, cv){
    try{
      const slots=this.loadCalcSlots();
      slots[idx]={name, cv, saved: new Date().toLocaleDateString()};
      localStorage.setItem(this.CALC_KEY+'-slots', JSON.stringify(slots));
    }catch(e){}
  },
  loadCalcSlots(){
    try{ const r=localStorage.getItem(this.CALC_KEY+'-slots'); return r?JSON.parse(r):[null,null,null,null,null]; }
    catch(e){ return [null,null,null,null,null]; }
  },
  deleteCalcSlot(idx){
    try{
      const slots=this.loadCalcSlots();
      slots[idx]=null;
      localStorage.setItem(this.CALC_KEY+'-slots', JSON.stringify(slots));
    }catch(e){}
  }
};

// ── Audio overlay system ──────────────────────────
let audioMode = STORE.getAudioMode();
function toggleAudioMode(){
  audioMode=!audioMode;
  STORE.setAudioMode(audioMode);
  document.body.classList.toggle('audio-mode',audioMode);
  const btn=document.getElementById('audio-toggle');
  btn.classList.toggle('active',audioMode);
  btn.title=audioMode?'Audio Guide Mode ON  -  tap to turn off':'Toggle Audio Guide Mode';
}
function audioPrompt(text){ return `<div class="audio-prompt">🎧 ${text}</div>`; }
// Apply saved audio mode on load  -  deferred to init block below

// ── Data ─────────────────────────────────────────────────────────
const HOUSES = {
  golden:{label:'Golden House', sub:'Part out of Whole',        color:'#A67C2E',bg:'#FFF8EC',line:'#D4A84C'},
  green: {label:'Green House',  sub:'Two Worlds Married',       color:'#1E7A5A',bg:'#EBF7F2',line:'#3DAB7A'},
  purple:{label:'Purple House', sub:'Two Independent Figures',  color:'#4A3A8C',bg:'#F0EDF9',line:'#7B68CC'},
};

const M = [
  {id:'occupancy',house:'golden',tier:1,
   name:'Occupancy Rate',formula:'Occupied Units ÷ Total Units',
   num:'Occupied Units',den:'Total Units',
   given:'Given one total unit…',result:'…this fraction of it is occupied and producing income.',
   invGiven:'Given one occupied unit…',invResult:'…this many total units exist relative to it.',
   meaning:'What portion of your building is producing income right now. The basic health check every investor watches weekly.',
   invMeaning:'How many times your occupied portion must repeat to fill the entire building.',
   benchmark:'Target above 90%. Below 80% is a concern. Compare to local market rates.',
   invNote:'The inverse starts high when the building is empty and falls toward 1.0 as units fill up. At 1.0 every unit is occupied. It can never go below 1.0. The higher the number, the more empty the building is.',
   fa:'Occupied Units',fb:'Total Units',
   calc:(a,b)=>{const r=a/b;return{r,inv:1/r,rd:pct(r),id:f(1/r,2)+'×'}}},

  {id:'vacancy',house:'golden',tier:1,
   name:'Vacancy Rate',formula:'Vacant Units ÷ Total Units',
   num:'Vacant Units',den:'Total Units',
   given:'Given one total unit…',result:'…this fraction of it is empty and producing nothing.',
   invGiven:'Given one vacant unit…',invResult:'…this many total units exist in the building.',
   meaning:'The investor\'s warning system. Forces you to look at what is NOT earning. Every empty unit costs you taxes, insurance, and mortgage with zero income.',
   invMeaning:'How many total units each vacant unit represents. At 50% vacancy the inverse is 2  -  each empty unit represents half the building.',
   benchmark:'Always use local market vacancy in your analysis. Never assume zero. 5% is a conservative baseline.',
   invNote:'Vacancy rate and occupancy rate always add to 100%. Two faces of the same coin.',
   fa:'Vacant Units',fb:'Total Units',
   calc:(a,b)=>{const r=a/b;return{r,inv:1/r,rd:pct(r),id:f(1/r,2)+'×'}}},

  {id:'expenseRatio',house:'golden',tier:1,
   name:'Expense Ratio',formula:'Operating Expenses ÷ Gross Income',
   num:'Operating Expenses',den:'Gross Income',
   given:'Given one dollar of gross income…',result:'…this many cents go to operating expenses.',
   invGiven:'Given one dollar of operating expenses…',invResult:'…this many dollars of gross income sit behind it.',
   meaning:'How heavy the property is to run. Every cent of expense ratio is a cent that cannot reach cash flow. Watch it creep over time.',
   invMeaning:'Income-to-expense multiple. If the inverse is 3× income is three times larger than expenses  -  a comfortable cushion.',
   benchmark:'30-35% excellent  ·  35-50% healthy  ·  50-65% watch  ·  65%+ danger.',
   invNote:'Below 2× means expenses eat more than half of gross income  -  a warning sign regardless of other metrics.',
   fa:'Annual Operating Expenses ($)',fb:'Annual Gross Income ($)',

// ── Helpers ───────────────────────────────────────────────────────
function f(n,d=2){return(!isFinite(n)||isNaN(n)||n===Infinity)?' - ':Number(n).toFixed(d)}
function pct(n){return(!isFinite(n)||isNaN(n))?' - ':(n*100).toFixed(1)+'%'}
function dollar(n){return(!isFinite(n)||isNaN(n))?' - ':'$'+Math.round(n).toLocaleString()}

function getGrade(id,val){
  if(!isFinite(val)||isNaN(val))return null;
  const t={
    occupancy:   [[.80,'danger'],[.90,'warn'],[2,'good']],
    vacancy:     [[.05,'good'],[.10,'warn'],[.20,'danger'],[2,'danger']],
    expenseRatio:[[.35,'good'],[.50,'good'],[.65,'warn'],[2,'danger']],
    ltv:         [[.70,'good'],[.80,'good'],[.90,'warn'],[2,'danger']],
    breakEven:   [[.65,'good'],[.75,'good'],[.85,'warn'],[.92,'danger'],[2,'danger']],
    capRate:     [[.04,'warn'],[.07,'warn'],[.10,'good'],[2,'info']],
    grm:         [[8,'good'],[12,'warn'],[25,'danger'],[999,'danger']],
    onePercent:  [[.007,'danger'],[.01,'warn'],[2,'good']],
    coc:         [[.05,'danger'],[.08,'warn'],[.12,'good'],[2,'info']],
    debtYield:   [[.06,'danger'],[.08,'danger'],[.10,'warn'],[.12,'good'],[2,'good']],
    equityMult:  [[1.5,'danger'],[2,'warn'],[2.5,'warn'],[3.5,'good'],[99,'info']],
    dscr:        [[1,'danger'],[1.2,'danger'],[1.4,'warn'],[10,'good']],
  };
  const g=t[id];if(!g)return null;
  for(let i=0;i<g.length;i++){
    if(val<=g[i][0]){
      const labels={good:'Looks Good',warn:'Watch This',danger:'Danger Zone',info:'Strong'};
      return{cls:'badge-'+g[i][1],label:gradeLabel(id,val)};
    }
  }
  return null;
}
function gradeLabel(id,val){
  const t={
    occupancy:   [[.80,'Low'],[.90,'Fair'],[2,'Strong']],
    vacancy:     [[.05,'Low'],[.10,'Moderate'],[.20,'High'],[2,'Critical']],
    expenseRatio:[[.35,'Excellent'],[.50,'Healthy'],[.65,'Watch'],[2,'Danger']],
    ltv:         [[.70,'Strong'],[.80,'Standard'],[.90,'High'],[2,'Very High']],
    breakEven:   [[.65,'Fortress'],[.75,'Comfortable'],[.85,'Moderate'],[.92,'Risky'],[2,'Danger']],
    capRate:     [[.04,'Low Yield'],[.07,'Fair'],[.10,'Strong'],[2,'High Yield']],
    grm:         [[8,'Strong'],[12,'Typical'],[25,'Expensive'],[999,'Very High']],
    onePercent:  [[.007,'Below 1%'],[.01,'Near 1%'],[2,'Passes 1%']],
    coc:         [[.05,'Weak'],[.08,'Fair'],[.12,'Strong'],[2,'Excellent']],
    debtYield:   [[.06,'Too Low'],[.08,'Marginal'],[.10,'Borderline'],[.12,'Acceptable'],[2,'Strong']],
    equityMult:  [[1.5,'Weak'],[2,'Fair'],[2.5,'Good'],[3.5,'Strong'],[99,'Excellent']],
    dscr:        [[1,'Failing'],[1.2,'Marginal'],[1.4,'Acceptable'],[10,'Strong']],
  };
  const g=t[id];if(!g)return '';
  for(let i=0;i<g.length;i++)if(val<=g[i][0])return g[i][1];
  return '';
}
function badgeCls(id,val){
  const t={
    occupancy:   [[.80,'danger'],[.90,'warn'],[2,'good']],
    vacancy:     [[.05,'good'],[.10,'warn'],[.20,'danger'],[2,'danger']],
    expenseRatio:[[.35,'good'],[.50,'good'],[.65,'warn'],[2,'danger']],
    ltv:         [[.70,'good'],[.80,'good'],[.90,'warn'],[2,'danger']],
    breakEven:   [[.65,'good'],[.75,'good'],[.85,'warn'],[.92,'danger'],[2,'danger']],
    capRate:     [[.04,'warn'],[.07,'warn'],[.10,'good'],[2,'info']],
    grm:         [[8,'good'],[12,'warn'],[25,'danger'],[999,'danger']],
    onePercent:  [[.007,'danger'],[.01,'warn'],[2,'good']],
    coc:         [[.05,'danger'],[.08,'warn'],[.12,'good'],[2,'info']],
    debtYield:   [[.06,'danger'],[.08,'danger'],[.10,'warn'],[.12,'good'],[2,'good']],
    equityMult:  [[1.5,'danger'],[2,'warn'],[2.5,'warn'],[3.5,'good'],[99,'info']],
    dscr:        [[1,'danger'],[1.2,'danger'],[1.4,'warn'],[10,'good']],

  const g=t[id];if(!g)return 'badge-info';
  for(let i=0;i<g.length;i++)if(val<=g[i][0])return 'badge-'+g[i][1];

// ── Navigation ────────────────────────────────────────────────────
let currentScreen='home';
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  document.querySelector('[data-screen="'+id+'"]').classList.add('active');
  document.getElementById('screen-wrap').scrollTop=0;
  currentScreen=id;
  // Push to nav history
  NAV.push({ screen:id, libFilter:libFilter, libOpen:libOpen, libSearch:libSearch||'', scrollTop:0 });
  // Rebuild destination screen so mastery dots and stats always reflect latest STORE state
  if(id==='home') buildHome();
  else if(id==='library') buildLibrary();
  else if(id==='quick') buildQuick();
  else if(id==='practice' && PR.mode==='menu') buildPractice();
  else if(id==='game') buildGame();
  else if(id==='deal') buildDeal();
}
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>showScreen(b.dataset.screen)));

  // Houses with mastery progress
  html+=`<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#777;margin-bottom:10px">The Three Houses</div>`;
  Object.entries(HOUSES).forEach(([key,h])=>{

    const mastered=houseM.filter(m=>STORE.getMasteryLevel(m.id)==='mastered').length;
    html+=`<div onclick="goToHouse('${key}')" style="background:#fff;border:1px solid #E2D9C8;border-left:4px solid ${h.line};border-radius:10px;padding:13px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;border-radius:9px;background:${h.bg};display:flex;align-items:center;justify-content:center;font-size:20px;color:${h.color};flex-shrink:0">◈</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:600;color:#1A1A1A;margin-bottom:1px">${h.label}</div>
        <div style="font-size:11px;color:#999">${h.sub}</div>

      <div style="background:${h.bg};color:${h.color};font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px;border:1px solid ${h.line}40">${mastered}/${count}</div>
    </div>`;
  });

  // Quick-access cards
  html+=`<div onclick="showScreen('blocks')" style="background:#1C1812;border-radius:10px;padding:13px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px">
    <div style="width:40px;height:40px;border-radius:9px;background:rgba(201,168,76,0.15);display:flex;align-items:center;justify-content:center;font-size:20px;color:#F5C842;flex-shrink:0">⬡</div>
    <div style="flex:1"><div style="font-size:14px;font-weight:600;color:#F5F0E8;margin-bottom:1px">Building Blocks</div>
    <div style="font-size:11px;color:rgba(245,240,232,.45)">Cash Flow, NOI, Equity, Valuation formulas</div></div>
    <div style="color:#F5C842;font-size:16px">›</div>

  html+=`<div onclick="showScreen('practice')" style="background:#1E7A5A;border-radius:10px;padding:13px 14px;margin-bottom:16px;cursor:pointer;display:flex;align-items:center;gap:12px">
    <div style="width:40px;height:40px;border-radius:9px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">✦</div>

  // Metric tiles with mastery dots
  html+=`<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#777;margin-bottom:10px">Foundation Metrics</div>`;
  html+=`<div class="tile-grid">`;

        <div style="width:8px;height:8px;border-radius:50%;background:${STORE.getMasteryColor(m.id)};flex-shrink:0" title="${STORE.getMasteryLabel(m.id)}"></div>

      <div class="formula">${m.formula}</div>

  });
  html+=`</div>`;

  html+=`<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#777;margin:10px 0 10px">Advanced Metrics</div>`;
  html+=`<div class="tile-grid">`;
  M.filter(m=>m.tier===2).forEach(m=>{
    const h=HOUSES[m.house];
    html+=`<div class="tile" onclick="goToMetric('${m.id}')" style="border-top:3px solid ${h.line}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div class="house-tag" style="color:${h.color}">${h.label.replace(' House','')} · Adv</div>
        <div style="width:8px;height:8px;border-radius:50%;background:${STORE.getMasteryColor(m.id)};flex-shrink:0" title="${STORE.getMasteryLabel(m.id)}"></div>
      </div>
      <div class="name">${m.name}</div>
      <div class="formula">${m.formula}</div>
    </div>`;
  });
  html+=`</div>`;

  el.innerHTML=html;
}

let libFilter='all';
let libOpen=null;
let libSearch='';

function buildLibrary(){
  const el=document.getElementById('s-library');
  const filters=[
    {id:'all',label:'All'},
    {id:'golden',label:'Golden'},
    {id:'green',label:'Green'},
    {id:'purple',label:'Purple'},
    {id:'tier1',label:'Foundation'},
    {id:'tier2',label:'Advanced'},
    {id:'favorites',label:'★ Saved'},
  ];

  let html=`<h2 style="font-family:Playfair Display,serif;font-size:22px;color:#1A1A1A;margin-bottom:4px">Metrics Library</h2>
  <p style="font-size:12px;color:#999;margin-bottom:12px">Tap any metric to expand its explanation, flip card, and calculator.</p>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="lib-search" placeholder="Search metrics, formulas, concepts…"
      value="${libSearch}" oninput="onLibSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false"/>
    ${libSearch?`<button class="search-clear" onclick="clearLibSearch()">✕</button>`:''}
  </div>`;

  if(!libSearch){
    html+=`<div class="pill-row">`;
    filters.forEach(ff=>{
      const h=HOUSES[ff.id];
      const active=libFilter===ff.id;
      const bg=active?(h?h.color:'#1C1812'):'#fff';
      const col=active?'#fff':(h?h.color:'#555');
      html+=`<button class="pill ${active?'active':''}" onclick="setLibFilter('${ff.id}')" style="${active?'background:'+bg+';color:'+col+';border-color:'+bg:''}">${ff.label}</button>`;
    });
    html+=`</div>`;
  }

  // House context banner — appears when a house filter is active
  const houseDescriptions = {
    golden: {
      question: 'Given the total number of units this building contains (denominator), how many of them are occupied and producing income (numerator)?',
      note: 'Note: Expense Ratio and Break-Even Ratio use Gross Income — actual rent collected under current leases — as their denominator. LTV uses Property Value. None of them count units.',
      intro: `Every number in this house was pulled from the same source. Occupied units were drawn from the total unit count. Expenses were drawn from gross income. The top number did not arrive from somewhere else — it was always sitting inside the bottom number waiting to be separated.<br><br>Think of a ten unit building where eight units are occupied. Those eight units did not come from outside the building. They are a portion of the ten. The part was always inside the whole.<br><br>When one number shifts, the whole structure shifts with it. If rents drop, gross income drops, NOI drops, the expense ratio worsens, and the break-even ratio climbs — all at once, automatically, because everything is connected to the same source.<br><br>LTV [Loan Amount ÷ Property Value] belongs in this house because at the moment the lender approves the loan, they require the loan to be a fraction of the value. At 80% LTV, eighty cents of every dollar of value is claimed by the lender. Twenty cents is yours. Part out of whole — on day one. But LTV can break through one entirely if property values fall far enough. That is what underwater means. LTV is always asking: how far do values have to fall before the part becomes larger than the whole?`,
      trigger: 'Trigger word: "out of"',
      whyTitle: 'What specifically goes wrong if the Golden House is skipped?',
      why: `<b>Profitable on paper</b> means the numbers the seller hands you look like the property is making money — but those numbers were built on assumptions that do not survive contact with reality. The Golden House catches these at the source.<br><br>
<b>Example:</b> A seller shows $96,000 gross income and $30,000 operating expenses — a 31% expense ratio. NOI looks like $66,000. Cap rate on a $600,000 asking price looks like 11%. But the seller self-manages. Adding 8% management fees ($7,680) and a 5% capital reserve ($4,800) produces real operating expenses of $42,480. Real NOI is $53,520. Real cap rate is 8.9%. The paper number was never real. The expense ratio check caught it.<br><br>
<b>Six dangers this house protects you from:</b><br><br>
<b>1. Buying a building that cannot survive a single bad month of vacancy.</b> If the break-even ratio [Total Costs ÷ Gross Income, where Total Costs = Operating Expenses + Annual Debt Service] is 89% and one unit sits empty for six weeks, actual income drops below what is needed to cover all costs. The mortgage still comes due. You are writing a personal check — not because the property is bad, but because you never calculated how thin the cushion was.<br><br>
<b>2. Accepting a seller's expense ratio [Operating Expenses ÷ Gross Income] without realizing management fees and reserves were left out.</b> A seller who self-manages has no management fee line. When you hire a manager at 8% of gross income that cost appears immediately. A 32% expense ratio becomes 46% under your ownership. Every metric downstream — NOI, cap rate [NOI ÷ Property Value], cash on cash [Annual Cash Flow ÷ Total Cash Invested], DSCR [NOI ÷ Annual Debt Service] — recalculates from that new number.<br><br>
<b>3. Overpaying for inflated occupancy that will not hold.</b> A seller with one exceptional year of full occupancy can present financials that make the building look stronger than it will ever be again. If you underwrite on that occupancy rate [Occupied Units ÷ Total Units] without checking the local market vacancy rate [Vacant Units ÷ Total Units], you are paying a price built on a peak that will revert.<br><br>
<b>4. Missing the break-even ratio [Total Costs ÷ Gross Income, where Total Costs = Operating Expenses + Annual Debt Service] and not knowing how thin the cushion is.</b> A property with a 7% cap rate, a healthy expense ratio, and standard LTV [Loan Amount ÷ Property Value] can still have a break-even ratio of 91% — meaning it can only absorb 9% vacancy before the owner subsidizes it. That is barely one month per year.<br><br>
<b>5. Getting into a high-LTV [Loan Amount ÷ Property Value] position without understanding the risk.</b> At 80% LTV you have twenty cents of equity per dollar of value. A 21% decline in property value puts you underwater. You cannot sell without bringing cash to closing. You cannot refinance because the collateral no longer covers the loan.<br><br>
<b>6. Underestimating how quickly a cascade starts.</b> A vacancy spike reduces Effective Gross Income [Gross Income − Vacancy Loss]. Lower EGI means lower NOI [EGI − Operating Expenses]. Lower NOI means lower DSCR [NOI ÷ Annual Debt Service]. Meanwhile the expense ratio worsens because fixed costs consume a larger fraction of reduced income. One vacancy event moves every metric simultaneously and in the same direction.`,
    },
    green: {
      question: 'Given the price I paid and the capital I personally deployed (denominator), how much income is this property producing per dollar (numerator)?',
      note: 'Note: Price I paid and capital I personally deployed are two different numbers. Price I paid is the purchase price. Capital I personally deployed is Total Cash Invested — down payment, closing costs, and all out-of-pocket costs at acquisition. Not the same number. The Green House contains six metrics, not five. Equity Multiple is the sixth. It does not appear in the investor question because it cannot be calculated while the property is still held. Equity Multiple measures total wealth produced per dollar invested across the entire hold including the sale. It is a projection going in and a final verdict coming out.',
      intro: `In this house the two numbers come from completely different places. They were not drawn from each other. They do not share an origin. One number measures income. The other measures price, capital, or debt. The property is what sits between them and makes the comparison possible — but it did not create either number.<br><br>Think of a building purchased for $500,000 that generates $40,000 in annual NOI [Effective Gross Income − Operating Expenses]. The purchase price was set by a negotiation on a specific day. The NOI was set by tenants paying rent, a market vacancy rate, and an operating expense structure built up over years. Neither number produced the other. The cap rate [NOI ÷ Property Value] simply divides one by the other to ask: given this price, how hard is each dollar of value working?<br><br>Two independent numbers. One property connecting them.`,
      trigger: 'Trigger word: "per"',
      whyTitle: 'What specifically goes wrong if the Green House is skipped?',
      why: `Even if the Golden House inputs look clean, the Green House will expose whether the price being asked is justified by the income being produced. A broker can present a 9% cap rate [NOI ÷ Property Value] that becomes 6.3% the moment NOI is rebuilt from honest expenses. A GRM [Purchase Price ÷ Annual Gross Rent] that looks attractive at 8× becomes 12× when honest gross rent is used. A cash on cash [Annual Cash Flow ÷ Total Cash Invested] that looks strong at 11% collapses to 3% when closing costs and immediate capital needs are included in total cash invested.<br><br>
<b>Five dangers this house protects you from:</b><br><br>
<b>1. Buying a well-operated building you simply paid too much for.</b> A property can have excellent occupancy, a lean expense ratio, and DSCR above 1.5 — and still produce a cash on cash return [Annual Cash Flow ÷ Total Cash Invested] of 3% because the price was too high. The Golden House says the building is healthy. The Green House says you overpaid for that health.<br><br>
<b>2. Accepting a broker's cap rate [NOI ÷ Property Value] without rebuilding it from honest expenses.</b> The broker used the seller's NOI [Effective Gross Income − Operating Expenses], which was missing management fees, capital reserves, and possibly had debt service buried inside it. The broker's 9% becomes your 6.3% the moment real costs are added. Build the NOI yourself every single time.<br><br>
<b>3. Failing to recognize that a high cap rate in a weak market reflects risk, not opportunity.</b> A cap rate of 11% in a market where everything else trades at 7% is not a bargain — it is a signal. Without comparing to the local prevailing rate you cannot tell whether you found value or inherited risk.<br><br>
<b>4. Measuring return without accounting for what you personally invested.</b> Two properties can have the same NOI and the same cap rate but completely different cash on cash returns [Annual Cash Flow ÷ Total Cash Invested] depending on how much was put down. A 20% down payment and a 40% down payment produce the same cap rate but very different personal capital efficiency.<br><br>
<b>5. Exiting without understanding whether the full journey built wealth.</b> A property can generate positive cash flow [NOI − Annual Debt Service] every year for seven years and still produce a mediocre equity multiple [Total Cash Returned ÷ Total Cash Invested] if the purchase price was too high or appreciation was flat. Cash on cash measures the pace. Equity multiple measures the destination.`,
    },
    purple: {
      question: 'Given its annual debt service (denominator), does its Net Operating Income (numerator) fully equal or exceed it?',
      note: 'Note: Both figures are annual. NOI is Effective Gross Income minus twelve months of operating expenses. Annual debt service is the monthly mortgage payment multiplied by twelve.',
      intro: `In this house the two numbers were set by completely different forces at completely different times and neither one has any influence over the other.<br><br>NOI [Effective Gross Income − Operating Expenses] is the result of what tenants pay, what the market vacancy rate is, and what it costs to operate the building. It moves constantly. A tenant leaves and NOI drops. Rents rise and NOI climbs. A pipe bursts and the repair cost pulls NOI down for that month.<br><br>Debt service was locked in on closing day by a lender who looked at one thing: the loan amount, the interest rate, and the term. That lender has never met your tenants. That lender does not know what the vacancy rate is this month. The payment is the same number it was on day one and it will be the same number ten years from now unless you refinance.<br><br><b>The demonstration:</b> A terrible property manager is inherited and NOI falls 30% in one year. The debt service payment does not fall by a single dollar. The manager is fired, an excellent one is hired, rents are raised, and NOI recovers completely. The debt service payment does not rise by a single dollar. The two numbers occupy the same building and are reported on the same financial statement. That is the extent of their relationship. DSCR [NOI ÷ Annual Debt Service] is simply asking which one is bigger and by how much.`,
      trigger: 'Two independent figures — neither came from the other',
      whyTitle: 'What specifically goes wrong if the Purple House is skipped?',
      why: `A property can pass the Golden House and the Green House on paper and still fail the Purple House in practice. If DSCR [NOI ÷ Annual Debt Service] comes in below 1.25 using honest NOI at current financing terms, the property cannot support its own debt. The paper profit — however clean the cap rate looked, however healthy the expense ratio appeared — does not translate into a self-sustaining investment.<br><br>
<b>Four dangers this house protects you from:</b><br><br>
<b>1. Taking on a property whose debt requires your personal income every month to survive.</b> A DSCR below 1.0 means the property generates less NOI [Effective Gross Income − Operating Expenses] than the mortgage requires. The gap comes directly out of your personal income every month. If you own three properties simultaneously with DSCR below 1.0 and your income is disrupted for any reason, all three need you at the same time. There is no separation between your personal finances and the property's survival.<br><br>
<b>2. Discovering at refinance that the lender's DSCR [NOI ÷ Annual Debt Service] minimum disqualifies you from the terms you counted on.</b> When year four arrives, the lender runs DSCR on current income. If NOI has not grown as projected, or rates have moved, or expenses climbed, the DSCR comes in at 1.1 instead of the 1.3 the lender requires. You either bring more equity, accept a worse rate, or stay in the original loan. The refinance thesis does not execute.<br><br>
<b>3. Selling into a situation where your buyer's lender runs DSCR and the weak number limits what they can offer you.</b> Your buyer is not paying cash. Their lender looks at the property's NOI and runs DSCR. If DSCR at the buyer's proposed loan falls below the lender minimum, the buyer cannot borrow that much. They either put more down or offer a lower price. A weak DSCR affects your ability to sell at full value, not just your ability to hold.<br><br>
<b>4. Stacking multiple properties with DSCR below 1.0 across your portfolio.</b> One property requiring $300/month in personal subsidy feels minor. Three properties requiring $300 each means $900/month of personal income going directly into debt service on properties that cannot feed themselves. A portfolio of self-sufficient properties with DSCR above 1.5 can run largely without you. A portfolio of dependent properties is a second job you cannot quit.`,
    },
  };
  if(HOUSES[libFilter] && houseDescriptions[libFilter]){
    const h=HOUSES[libFilter];
    const hd=houseDescriptions[libFilter];
    // Intro card
    html+=`<div style="background:${h.bg};border:1px solid ${h.line}60;border-left:4px solid ${h.line};border-radius:10px;padding:14px 16px;margin-bottom:12px">
      <div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:${h.color};margin-bottom:6px">The Question This House Answers</div>
      <div style="font-size:14px;font-weight:700;color:#1A1A1A;line-height:1.5;margin-bottom:6px">${hd.question}</div>
      ${hd.note ? `<div style="font-size:11px;color:#666;line-height:1.6;font-style:italic;margin-bottom:10px;padding:8px 10px;background:rgba(0,0,0,0.04);border-radius:6px">${hd.note}</div>` : ''}
      <div style="font-size:12px;color:#444;line-height:1.75">${hd.intro}</div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid ${h.line}40">
        <div style="font-size:10px;font-weight:700;color:${h.color};letter-spacing:.5px;text-transform:uppercase">${hd.trigger}</div>
      </div>
    </div>`;
    // Why This Matters card
    let wtmOpen=false;
    html+=`<div style="background:#fff;border:1px solid #E2D9C8;border-left:4px solid ${h.line};border-radius:10px;margin-bottom:14px;overflow:hidden">
      <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'" style="padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:${h.color};margin-bottom:3px">Why This Matters</div>
          <div style="font-size:13px;font-weight:600;color:#1A1A1A">${hd.whyTitle}</div>
        </div>
        <span style="font-size:18px;color:${h.color}">⌄</span>
      </div>
      <div style="display:none;padding:0 16px 16px;border-top:1px solid #E2D9C8">
        <div style="font-size:12px;color:#333;line-height:1.85;margin-top:12px">${hd.why}</div>
      </div>
    </div>`;
  }


  const shown=M.filter(m=>{
    if(libSearch){
      const q=libSearch.toLowerCase();
      return m.name.toLowerCase().includes(q)||m.formula.toLowerCase().includes(q)||
             m.meaning.toLowerCase().includes(q)||m.benchmark.toLowerCase().includes(q)||
             m.invMeaning.toLowerCase().includes(q)||HOUSES[m.house].label.toLowerCase().includes(q);
    }
    if(libFilter==='favorites') return STORE.isFavorite(m.id);
    if(libFilter==='all')return true;
    if(libFilter==='tier1')return m.tier===1;
    if(libFilter==='tier2')return m.tier===2;
    return m.house===libFilter;
  });

  if(shown.length===0){
    html+=`<div class="search-empty">
      <div style="font-size:28px;margin-bottom:8px">${libFilter==='favorites'?'★':'🔍'}</div>
      <div style="font-weight:600;color:#555;margin-bottom:4px">${libFilter==='favorites'?'No saved metrics yet':'No results'}</div>
      <div style="font-size:12px">${libFilter==='favorites'?'Tap ★ on any metric to save it here':'Try a different search term'}</div>
    </div>`;
  } else {
    shown.forEach(m=>{ html+=buildMetricCard(m); });
  }

  el.innerHTML=html;
  if(libSearch){ const inp=document.getElementById('lib-search'); if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);} }
  attachLibListeners();
}

function onLibSearch(val){ libSearch=val; libOpen=null; buildLibrary(); }
function clearLibSearch(){ libSearch=''; libOpen=null; buildLibrary(); }

function setLibFilter(f){
  libFilter=f; libOpen=null; libSearch=''; buildLibrary();
  NAV.push({ screen:'library', libFilter:f, libOpen:null, libSearch:'', scrollTop:0 });
}

  const isOpen=libOpen===m.id;
  let inner='';
  if(isOpen){
    inner=`<div class="expander-body fade-up">
      <!-- Flip card -->
      <div class="flip-wrap">
        <div class="flip-inner${''}" id="flip-${m.id}" style="height:170px">
          <div class="flip-face" style="background:${h.bg};border:1px solid ${h.line}60">
            <div>
              <div style="display:inline-block;background:${h.color};color:#fff;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:10px">Original Fraction</div>
              <div style="font-size:15px;color:#1A1A1A;font-weight:500;margin-bottom:8px">
                <span style="color:${h.color};font-weight:700">${m.num}</span>
                <span style="color:#999"> ÷ </span>
                <span style="color:#1A1A1A">${m.den}</span>
              </div>
              <p style="font-size:12px;color:#555;line-height:1.6"><strong style="color:${h.color}">${m.given}</strong> ${m.result}</p>
            </div>
            <button class="flip-btn" onclick="doFlip('${m.id}')" style="background:#fff;border:1px solid ${h.line};color:${h.color}">Flip for Inverse →</button>
          </div>
          <div class="flip-face flip-back-face" style="border:2px solid ${h.line}">
            <div>
              <div style="display:inline-block;background:#1C1812;color:#fff;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:10px">Inverted Fraction</div>
              <div style="font-size:15px;color:#1A1A1A;font-weight:500;margin-bottom:8px">
                <span style="color:#1A1A1A">${m.den}</span>
                <span style="color:#999"> ÷ </span>

function toggleFav(id){
  STORE.toggleFavorite(id);
  buildLibrary();
}

function toggleLib(id){
  var wasOpen=libOpen;
  libOpen=libOpen===id?null:id;
  buildLibrary();
  if(libOpen && libOpen!==wasOpen){
    NAV.push({ screen:'library', libFilter:libFilter, libOpen:id, libSearch:libSearch||'', scrollTop:0 });
    setTimeout(()=>{
      const el=document.getElementById('exp-'+id);
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    },50);
  }
}

function doFlip(id){
  const el=document.getElementById('flip-'+id);
  if(el)el.classList.toggle('flipped');
}

function doLibCalc(id){
  const m=M.find(x=>x.id===id);
  if(!m)return;
  const a=parseFloat(document.getElementById('lib-a-'+id)?.value)||0;
  const b=parseFloat(document.getElementById('lib-b-'+id)?.value)||0;
  const c=parseFloat(document.getElementById('lib-c-'+id)?.value)||0;
  let res;
  try{res=m.calc(a,b,c);}catch(e){return;}
  const h=HOUSES[m.house];
  const gl=gradeLabel(id,res.r);
  const bc=badgeCls(id,res.r);
  let html=`<div class="calc-result-grid">
    <div class="calc-box" style="background:${gl?'':''};border-color:${h.line}">
      <div class="lbl" style="color:${h.color}">Result ${gl?`<span class="badge ${bc}" style="margin-left:4px">${gl}</span>`:''}</div>
      <div class="num" style="color:#1A1A1A">${res.rd}</div>
      <div class="sub">Original</div>
    </div>
    <div class="calc-box" style="background:${h.bg};border-color:${h.line}">
      <div class="lbl" style="color:${h.color}">Inverse</div>
      <div class="num" style="color:${h.color}">${res.id}</div>
      <div class="sub">${res.extra?res.extra.label:'Flipped'}</div>
    </div>
    ${res.extra?`<div class="calc-full"><span>${res.extra.label}: </span><strong>${res.extra.val}</strong>${res.extra.sub?` <span style="color:#999">· ${res.extra.sub}</span>`:''}</div>`:''}
  </div>`;
  document.getElementById('lib-result-'+id).innerHTML=html;
}

const CV_DEFAULTS={

const CV=STORE.loadCalcCurrent({...CV_DEFAULTS});

        slotsHtml+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F0EBE0">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:#1A1A1A">${slot.name}</div>

          <button onclick="loadCalcSlot(${i})" style="padding:5px 12px;background:#1C1812;border:none;border-radius:6px;font-size:11px;font-weight:600;color:#fff;font-family:DM Sans,sans-serif;cursor:pointer">Load</button>
          <button onclick="deleteCalcSlot(${i})" style="padding:5px 10px;background:transparent;border:1px solid #E2D9C8;border-radius:6px;font-size:11px;color:#999;font-family:DM Sans,sans-serif;cursor:pointer">✕</button>
        </div>`;
      } else {
        slotsHtml+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F0EBE0">
          <div style="flex:1;font-size:12px;color:#ccc;font-style:italic">Empty slot ${i+1}</div>
          <button onclick="saveCalcSlot(${i})" style="padding:5px 12px;background:transparent;border:1px solid #E2D9C8;border-radius:6px;font-size:11px;color:#777;font-family:DM Sans,sans-serif;cursor:pointer">Save here</button>
        </div>`;
      }
    }
    slotsHtml+=`</div>`;
  }

  el.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <div><h2 style="font-family:Playfair Display,serif;font-size:24px;color:#1A1A1A">Quick Calc</h2><div style="font-size:11px;color:#999;margin-top:2px">Single metric at a time — for spot checks</div></div>
    <button onclick="calcShowSlots=!calcShowSlots;buildCalc()" style="background:${calcShowSlots?'#1C1812':'#fff'};border:1px solid ${calcShowSlots?'#1C1812':'#E2D9C8'};border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;color:${calcShowSlots?'#F5C842':'#777'};font-family:DM Sans,sans-serif;cursor:pointer">

}

function saveCalcSlot(idx){
  const name=prompt('Name this property:');
  if(!name||!name.trim()) return;
  readCalcInputs();
  STORE.saveCalcSlot(idx, name.trim(), {...CV});
  buildCalc();
}

function loadCalcSlot(idx){
  const slots=STORE.loadCalcSlots();
  const slot=slots[idx];
  if(!slot) return;
  Object.assign(CV, slot.cv);
  autoSaveCalc();
  calcTab='inputs';
  calcShowSlots=false;
  buildCalc();
}

function deleteCalcSlot(idx){
  STORE.deleteCalcSlot(idx);
  buildCalc();
}


function switchCalcTab(t){
  if(t==='results')readCalcInputs();
  calcTab=t;
  buildCalc();
}

function readCalcInputs(){
  const keys=Object.keys(CV_DEFAULTS);
  keys.forEach(k=>{
    const el=document.getElementById('ci-'+k);
    if(el)CV[k]=parseFloat(el.value)||0;
  });
  autoSaveCalc();
}

function renderCalcBody(){
  const el=document.getElementById('calc-body');
  if(calcTab==='inputs'){
    el.innerHTML=`
    <div class="card" style="padding:18px;margin-bottom:10px">
      <div class="section-label" style="color:#A67C2E;border-bottom:1px solid #EDE5D8">Property</div>

      ${cField('Monthly Rent ($)','monthlyRent','Annual gross income auto-calculated')}
      ${cField('Annual Operating Expenses ($)','annualExpenses','Taxes, insurance, maintenance, management  -  not the mortgage')}

      ${cField('Total Cash Invested ($)','cashInvested','Down payment + closing costs + repairs')}
      ${cField('Annual Debt Service ($)','annualDebtService','Total annual principal & interest payments')}
    </div>
    <div class="card" style="padding:18px;margin-bottom:10px">
      <div class="section-label" style="color:#1E7A5A;border-bottom:1px solid #EDE5D8">Units</div>

      ${cField('Occupied Units','occupiedUnits')}

      <div class="section-label" style="color:#4A3A8C;border-bottom:1px solid #EDE5D8">Stress Test</div>
      ${cField('Market Vacancy Rate (%)','marketVacancy','Call 3 local property managers and average their answers')}
      ${cField('Holding Period (years)','holdingYears')}
      ${cField('Projected Sale Price ($)','salePrice')}
      ${cField('Remaining Loan at Sale ($)','remainingLoan')}
    </div>
    <button class="btn btn-dark" onclick="switchCalcTab('results')">View All Results →</button>`;
  } else {
    const gi=CV.monthlyRent*12;
    const vacL=gi*(CV.marketVacancy/100);
    const effGI=gi-vacL;
    const noi=gi-CV.annualExpenses;
    const cf=noi-CV.annualDebtService;
    const tc=CV.annualExpenses+CV.annualDebtService;
    const occ=CV.occupiedUnits/CV.totalUnits;
    const vac=(CV.totalUnits-CV.occupiedUnits)/CV.totalUnits;
    const er=CV.annualExpenses/gi;
    const ltv=CV.loanAmount/CV.purchasePrice;
    const be=tc/gi;
    const cush=1-be;
    const cap=noi/CV.purchasePrice;
    const grm=CV.purchasePrice/gi;
    const op=CV.monthlyRent/CV.purchasePrice;
    const coc=cf/CV.cashInvested;
    const dscr=noi/CV.annualDebtService;
    const dy=noi/CV.loanAmount;
    const ml=noi/0.10;
    const annF=cf*CV.holdingYears;
    const netS=CV.salePrice-CV.remainingLoan;
    const totR=annF+netS;
    const em=totR/CV.cashInvested;

    let html=`
    <div style="background:#1C1812;border-radius:12px;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${sumBox('Gross Income',dollar(gi),'#F5F0E8')}
      ${sumBox('NOI',dollar(noi),noi>=0?'#86EFAC':'#FCA5A5')}
      ${sumBox('Annual Cash Flow',dollar(cf),cf>=0?'#86EFAC':'#FCA5A5')}
      ${sumBox('Effective GI',dollar(effGI),'rgba(245,240,232,.7)')}
    </div>

    <div class="section-label" style="color:#A67C2E;padding-left:2px">⬡ Golden House</div>
    ${rRow('Occupancy Rate','golden','occupancy',occ,pct(occ),1/occ,f(1/occ,2)+'×')}
    ${rRow('Vacancy Rate','golden','vacancy',vac,pct(vac),1/vac,f(1/vac,2)+'×')}
    ${rRow('Expense Ratio','golden','expenseRatio',er,pct(er),1/er,f(1/er,2)+'×')}
    ${rRow('LTV','golden','ltv',ltv,pct(ltv),1/ltv,f(1/ltv,2)+'×')}
    ${rRow('Break-Even Ratio','golden','breakEven',be,pct(be),1/be,f(1/be,2)+'×','Vacancy cushion: '+pct(cush)+' · '+f(cush*12,1)+' months/yr before going underwater')}

    <div class="section-label" style="color:#1E7A5A;padding-left:2px;margin-top:8px">⬢ Green House</div>
    ${rRow('Cap Rate','green','capRate',cap,pct(cap),1/cap,f(1/cap,2)+'×','Inverse = income multiplier. Multiply any NOI by it to find value at this cap rate.')}
    ${rRow('GRM','green','grm',grm,f(grm,2)+'×',1/grm,pct(1/grm))}
    ${rRow('One Percent Rule','green','onePercent',op,pct(op),1/op,f(1/op,0)+'×')}
    ${rRow('Cash on Cash','green','coc',coc,pct(coc),1/coc,f(1/coc,1)+' yrs','Inverse = payback period. Years until cash flow alone recovers every dollar invested.')}
    ${rRow('Debt Yield','green','debtYield',dy,pct(dy),1/dy,f(1/dy,2)+'×','Max loan @ 10% debt yield: '+dollar(ml))}
    ${rRow('Equity Multiple','green','equityMult',em,f(em,2)+'×',1/em,pct(1/em),'Total returned: '+dollar(totR)+' · Pure gain fraction: '+pct(1-(1/em)))}

    <div class="section-label" style="color:#4A3A8C;padding-left:2px;margin-top:8px">⬣ Purple House</div>
    ${rRow('DSCR','purple','dscr',dscr,f(dscr,2)+'×',1/dscr,pct(1/dscr),dscr>=1.25?'✓ Meets lender minimum of 1.25×':dscr>=1?'⚠ Below lender minimum  -  most commercial lenders will not approve':'✕ Property cannot cover its own mortgage from income')}

    <div class="card" style="padding:14px;margin-bottom:10px">

      <p style="font-size:13px;color:#555;line-height:1.7">Not a single fraction  -  requires a financial calculator. <strong style="color:#1A1A1A">Target: 15-20% for value-add. 10-15% for stabilised assets.</strong> Measures true annualised return accounting for when each dollar arrived.</p>
    </div>

    <button class="btn btn-ghost" onclick="switchCalcTab('inputs')">← Edit Inputs</button>`;
    el.innerHTML=html;
  }
}

  return `<div><div style="font-size:10px;color:rgba(245,240,232,.45);margin-bottom:3px">${label}</div><div style="font-size:17px;font-weight:700;color:${color}">${val}</div></div>`;

            <div class="audio-flip-hint" style="margin-bottom:10px">▶ Predict the result before tapping Calculate</div>
            ${item.fields.map(fld=>`<div class="field"><label>${fld.label}</label><input type="number" id="blk-f-${key}-${fld.key}" placeholder="0" inputmode="decimal"/></div>`).join('')}
            <button class="btn btn-dark" onclick="doBlockCalc('${key}',${gi},${ii})">Calculate</button>
            <div id="blk-result-${key}"></div>
          </div>
        </div>`;
      }
      html+=`</div>`;
    });
    html+=`<div style="height:14px"></div>`;
  });

  el.innerHTML=html;
}

function toggleBlock(key){
  blocksOpen=blocksOpen===key?null:key;
  buildBlocks();
  if(blocksOpen){
    setTimeout(()=>{
      const el=document.getElementById('blk-'+key);
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    },60);
  }
}

function doBlockCalc(key,gi,ii){
  const group=BLOCKS[gi];
  const item=group.items[ii];
  const vals=item.fields.map(fld=>parseFloat(document.getElementById('blk-f-'+key+'-'+fld.key)?.value)||0);
  let res;
  try{ res=item.calc(...vals); }catch(e){ return; }
  const html=`<div style="background:${group.bg};border:2px solid ${group.line};border-radius:8px;padding:14px;margin-top:12px;text-align:center">
    <div style="font-size:10px;font-weight:700;color:${group.color};letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">${item.name}</div>
    <div style="font-size:28px;font-weight:700;color:#1A1A1A;margin-bottom:6px">${res.display}</div>
    <div style="font-size:12px;color:#666;font-style:italic">${res.note}</div>
  </div>`;
  document.getElementById('blk-result-'+key).innerHTML=html;
}

function randBetween(min, max, dec=0) {
  const v = Math.random()*(max-min)+min;
  return dec>0 ? parseFloat(v.toFixed(dec)) : Math.round(v);
}

// Adaptive metric picker - biases toward weak and unseen metrics
function pickWeightedMetric(){
  const weights = M.map(m => {
    const lvl = STORE.getMasteryLevel(m.id);
    if(lvl === 'unseen')     return 4; // highest priority - never seen
    if(lvl === 'needs-work') return 3; // high priority - struggling
    if(lvl === 'learning')   return 2; // medium priority - improving
    return 1;                          // mastered - still appears occasionally
  });
  const total = weights.reduce((a,b)=>a+b,0);
  let rand = Math.random() * total;
  for(let i=0;i<M.length;i++){
    rand -= weights[i];
    if(rand <= 0) return M[i];
  }
  return M[M.length-1];
}

function startMode(mode){
  PR.mode=mode;
  PR.answered=false;
  PR.chosen=null;
  if(mode==='flash'){
    const shuffled=[...FLASHCARDS].sort(()=>Math.random()-0.5);
    PR.cards=shuffled;
    PR.cardIdx=0;
    PR.cardFlipped=false;
  }
  if(mode==='multi'||mode==='knowledge'){
    PR.current=mode==='multi'?genMultiQ():genKnowledgeQ();
    PR.answered=false;
    PR.chosen=null;
  }
  if(mode==='bench'){
    PR.current=genBenchmarkQ();
    PR.answered=false;
    PR.chosen=null;
  }
  if(mode==='session'){
    const m=pickWeightedMetric();
    PR.sessionMetric=m;
    PR.sessionStep=0;
    PR.sessionFlipped=false;
    PR.sessionFlashRated=false;
    PR.sessionMCQ=null;
    PR.sessionBenchOrKnowledge=null;
    PR.sessionMasteryBefore=STORE.getMasteryLevel(m.id);
    // Pre-generate step 2 (MCQ) and step 3 (bench or knowledge)
    // Step 2: one of 4 MCQ types for this metric
    const mcqTypes=['formula','name','house','inverse'];
    const chosenType=mcqTypes[Math.floor(Math.random()*mcqTypes.length)];
    PR.sessionMCQ=genSessionMCQ(m,chosenType);
    // Step 3: bench if metric has benchmark, else knowledge
    const benchMetrics=['capRate','dscr','coc','expenseRatio','ltv','breakEven','equityMult','debtYield'];
    if(benchMetrics.includes(m.id)){
      PR.sessionBenchOrKnowledge={type:'bench',q:genBenchmarkQForMetric(m.id)};
    } else {
      PR.sessionBenchOrKnowledge={type:'knowledge',q:genKnowledgeQ()};
    }
  }
  if(mode==='stepby'){
    PR.scenario=STEP_SCENARIOS[Math.floor(Math.random()*STEP_SCENARIOS.length)];
    PR.stepIdx=0;
    PR.stepAnswers=[];
    PR.stepInput='';
    PR.stepResult=null;
  }
  buildPractice();
}

function genKnowledgeQ(){
  const q=KNOWLEDGE_QS[Math.floor(Math.random()*KNOWLEDGE_QS.length)];
  const shuffle=(a)=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;};
  const others=KNOWLEDGE_QS.filter(x=>x.q!==q.q);
  const wrong=shuffle(others).slice(0,3).map(x=>x.a);
  // Knowledge questions are conceptual  -  no single metricId, tracked as general score
  return {q:q.q, opts:shuffle([q.a,...wrong]), correct:q.a, explain:q.explanation, metricId:null};
}

function rateCard(correct){
  const card=PR.cards[PR.cardIdx];
  if(card.mid){
    const d=STORE.recordAnswer(card.mid, correct);
    PR.total=d.scores.total;
    PR.score=d.scores.correct;
    PR.streak=d.streak.current;
    PR.bestStreak=d.streak.best;
  }
  // Auto-advance after rating
  if(PR.cardIdx<PR.cards.length-1){ PR.cardIdx++; PR.cardFlipped=false; }
  else{ PR.mode='menu'; }
  buildPractice();
}

function prevCard(){
  if(PR.cardIdx>0){PR.cardIdx--;PR.cardFlipped=false;}
  buildPractice();
}
function nextCard(){
  if(PR.cardIdx<PR.cards.length-1){PR.cardIdx++;PR.cardFlipped=false;}
  else{PR.mode='menu';}
  buildPractice();
}

function renderMCQ(el,q,mode,title){

  let optsHtml='';
  q.opts.forEach((opt,i)=>{
    let bg=bgs.neutral,border=borders.neutral,color=colors.neutral,extra='';
    if(PR.answered){
      if(opt===q.correct){bg=bgs.correct;border=borders.correct;color=colors.correct;extra=' ✓';}
      else if(opt===PR.chosen&&opt!==q.correct){bg=bgs.wrong;border=borders.wrong;color=colors.wrong;extra=' ✗';}
      else{bg='#F9F6F0';color='#999';}
    }
    optsHtml+=`<div onclick="${PR.answered?'':'answerMCQ(\''+opt.replace(/'/g,"\\'")+'\')'}" style="background:${bg};border:2px solid ${border};border-radius:8px;padding:12px 14px;cursor:${PR.answered?'default':'pointer'};font-size:13px;font-weight:500;color:${color};line-height:1.5;margin-bottom:8px;transition:all .2s">${opt}${extra}</div>`;

  ${PR.answered?`
  <div style="background:${PR.chosen===q.correct?'#DCFCE7':'#FEE2E2'};border:2px solid ${PR.chosen===q.correct?'#3DAB7A':'#E07070'};border-radius:10px;padding:14px;margin-bottom:12px">
    <div style="font-size:11px;font-weight:700;color:${PR.chosen===q.correct?'#166534':'#991B1B'};letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">${PR.chosen===q.correct?'✓ Correct!':'✗ Not quite'}</div>
    <p style="font-size:13px;color:#333;line-height:1.65">${q.explain}</p>
  </div>
  <button onclick="nextMCQ('${mode}')" style="width:100%;padding:13px;background:#1C1812;border:none;border-radius:8px;font-size:14px;font-weight:600;color:#fff;font-family:DM Sans,sans-serif;cursor:pointer">Next Question →</button>`
  :'<div style="text-align:center;font-size:12px;color:#ccc;padding:8px">Tap an answer above</div>'}`;
}

function answerMCQ(chosen){
  if(PR.answered)return;
  PR.answered=true;
  PR.chosen=chosen;
  const correct=chosen===PR.current.correct;
  // Record to STORE (links to metric if question has metricId)
  const d=STORE.recordAnswer(PR.current.metricId||null, correct);
  // Keep PR in sync with STORE for display
  PR.total=d.scores.total;
  PR.score=d.scores.correct;
  PR.streak=d.streak.current;
  PR.bestStreak=d.streak.best;
  buildPractice();
  // Refresh home mastery dots silently
  if(document.getElementById('s-home').classList.contains('active')) buildHome();
}

function nextMCQ(mode){
  PR.answered=false;
  PR.chosen=null;
  PR.current=mode==='multi'?genMultiQ():genKnowledgeQ();
  buildPractice();

function buildBench(el){
  const q=PR.current;
  const opts=['Strong','Acceptable','Watch','Danger','Very Low','Too Low','Fortress','Comfortable','Moderate','Risky','Excellent','High Yield','Low Yield','Fair','Low','High','Critical','Very High'];
  const shown=[];
  shown.push(q.label);
  const others=opts.filter(o=>o!==q.label);
  const shuffle=(a)=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;};
  while(shown.length<4&&others.length>0){
    const pick=others.splice(Math.floor(Math.random()*others.length),1)[0];
    if(!shown.includes(pick))shown.push(pick);
  }
  const shuffled=shuffle([...shown]);

  let optsHtml='';
  shuffled.forEach(opt=>{
    let bg='#fff',border='#E2D9C8',color='#1A1A1A',extra='';
    if(PR.answered){
      if(opt===q.label){bg='#DCFCE7';border='#3DAB7A';color='#166534';extra=' ✓';}
      else if(opt===PR.chosen&&opt!==q.label){bg='#FEE2E2';border='#E07070';color='#991B1B';extra=' ✗';}
      else{bg='#F9F6F0';color='#999';}
    }
    optsHtml+=`<div onclick="${PR.answered?'':'answerBench(\''+opt+'\')'}" style="background:${bg};border:2px solid ${border};border-radius:8px;padding:11px 14px;cursor:${PR.answered?'default':'pointer'};font-size:13px;font-weight:500;color:${color};margin-bottom:8px;transition:all .2s">${opt}${extra}</div>`;
  });

  el.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <button onclick="PR.mode='menu';buildPractice()" style="background:transparent;border:none;font-size:22px;color:#999;cursor:pointer;padding:0">‹</button>

// ── Session Mode ───────────────────────────────────
function genSessionMCQ(m, type) {
  const shuffle=(a)=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;};
  const others=M.filter(x=>x.id!==m.id);
  if(type==='formula'){
    const wrong=shuffle(others).slice(0,3).map(o=>o.formula);
    return {q:'What is the formula for '+m.name+'?',opts:shuffle([m.formula,...wrong]),correct:m.formula,explain:'The formula for '+m.name+' is: '+m.formula,metricId:m.id};
  }
  if(type==='name'){
    const wrong=shuffle(others).slice(0,3).map(o=>o.name);
    return {q:'Which metric uses the formula: '+m.formula+'?',opts:shuffle([m.name,...wrong]),correct:m.name,explain:m.name+' uses '+m.formula,metricId:m.id};
  }
  if(type==='house'){
    const houseNames={golden:'Golden House',green:'Green House',purple:'Purple House'};
    const correct=houseNames[m.house];
    const wrong=Object.values(houseNames).filter(h=>h!==correct);
    return {q:'Which house does '+m.name+' belong to?',opts:shuffle([correct,...wrong]),correct:correct,explain:m.name+' belongs to '+correct+'. '+HOUSES[m.house].sub+'.',metricId:m.id};
  }
  // inverse
  const wrong=shuffle(others).slice(0,3).map(o=>o.invMeaning.split('.')[0]);
  const correct=m.invMeaning.split('.')[0];
  return {q:'When you flip '+m.name+', what does the inverse tell you?',opts:shuffle([correct,...wrong]),correct:correct,explain:'The inverse of '+m.name+' tells you: '+m.invMeaning,metricId:m.id};
}

function genBenchmarkQForMetric(metricId){
  // Find the benchmark template for this metricId in genBenchmarkQ templates and call its gen()
  // We call genBenchmarkQ repeatedly until we get the right metric (max 20 tries)
  for(let i=0;i<30;i++){
    const q=genBenchmarkQ();
    if(q.metricId===metricId) return q;
  }
  return genBenchmarkQ(); // fallback
}

// ── Web Audio sounds ──────────────────────────
const AUDIO = {
  ctx: null,
  init() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },
  play(freq, dur, type='sine', vol=0.3) {
    try {
      this.init();
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.connect(g); g.connect(this.ctx.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
      o.start(); o.stop(this.ctx.currentTime + dur);
    } catch(e) {}
  },
  correct()  { this.play(523, 0.12); setTimeout(()=>this.play(659, 0.12), 80); setTimeout(()=>this.play(784, 0.2), 160); },
  wrong()    { this.play(220, 0.15, 'sawtooth', 0.2); setTimeout(()=>this.play(180, 0.2, 'sawtooth', 0.15), 100); },
  streak()   { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.play(f,0.15),i*70)); },
  tick()     { this.play(800, 0.04, 'sine', 0.1); },
  gameOver() { [392,349,330,294].forEach((f,i)=>setTimeout(()=>this.play(f,0.18,'triangle'),i*90)); }
};

const GSCORE = {
  KEY: 're-game-v1',
  get() { try { const r=localStorage.getItem(this.KEY); return r?JSON.parse(r):{}; } catch(e){ return {}; } },
  save(d) { try { localStorage.setItem(this.KEY, JSON.stringify(d)); } catch(e) {} },
  record(mode, score, streak) {
    const d = this.get();
    if (!d[mode]) d[mode] = { high: 0, played: 0, bestStreak: 0 };
    d[mode].played++;
    if (score > d[mode].high) d[mode].high = score;
    if (streak > d[mode].bestStreak) d[mode].bestStreak = streak;
    this.save(d); return d[mode];
  },
  get_mode(mode) { const d=this.get(); return d[mode]||{high:0,played:0,bestStreak:0}; },
  LEVEL_KEY: 're-game-levelmode',
  getLevelMode() { try { return localStorage.getItem(this.LEVEL_KEY)==='1'; } catch(e){ return false; } },
  setLevelMode(v) { try { localStorage.setItem(this.LEVEL_KEY, v?'1':'0'); } catch(e){} }
};

function toggleLevelMode() {

// ── GAME LAUNCHER ─────────────────────────────
function startGame(mode, rounds, unlimited) {
  AUDIO.init();
  GS.mode = mode;
  GS.score = 0;
  GS.streak = 0;
  GS.best = 0;
  GS.lives = unlimited ? 5 : 3;
  GS.round = 0;
  GS.totalRounds = rounds;
  GS.unlimited = unlimited || false;
  GNEW.resetPools();
  const el = document.getElementById('s-game');
  nextRound(el);
}

function nextRound(el) {
  // Clean up hold listeners from previous round
  el.removeEventListener('touchstart', gOnHoldStart);
  el.removeEventListener('touchend', gOnHoldEnd);
  el.removeEventListener('touchcancel', gOnHoldEnd);
  gHoldCallback = null;
  gHoldPaused = false;
  GS.round++;
  if (!GS.unlimited && GS.round > GS.totalRounds) { endGame(el); return; }
  gClear();
  switch(GS.mode) {
    case 'crossing':   renderCrossing(el); break;
    case 'housesort':  renderHouseSort(el); break;
    case 'match':      renderMatch(el); break;
    case 'formula':    renderFormula(el); break;
    case 'oddone':     renderOddOne(el); break;
    case 'bench':      renderBench(el); break;
    case 'flip':       renderFlip(el); break;
    case 'deal':       renderDeal(el); break;
    case 'nextstep':   renderNextStep(el); break;
    case 'whichprop':  renderWhichProp(el); break;
    case 'truefalse':  renderTrueFalse(el); break;
    case 'fixformula': renderFixFormula(el); break;
    case 'namemetric': renderNameMetric(el); break;
    case 'waterfall':  renderWaterfallBuilder(el); break;
    case 'danger':     renderDangerSpotter(el); break;
    case 'deepdive':   renderDeepDive(el); break;
  }
}

// ── SCORE BAR ─────────────────────────────────

  GS.hintContext = hintContext || GS.hintContext || {};
  const maxLives = GS.unlimited ? 5 : 3;
  const lives = '❤️'.repeat(Math.max(0,GS.lives)) + '🖤'.repeat(Math.max(0,maxLives-GS.lives));
  return `
    <div class="g-score-bar">
      <div>
        <div style="font-size:10px;color:#888;letter-spacing:1px;text-transform:uppercase">Score</div>
        <div style="font-size:20px;font-weight:700;color:#F5C842">${GS.score}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:10px;color:#888;letter-spacing:1px;text-transform:uppercase">Round</div>
        <div style="font-size:16px;font-weight:600">${GS.unlimited ? GS.round+' ∞' : GS.round+' / '+GS.totalRounds}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
