// ── ANSWER HANDLER ────────────────────────────
function handleAnswer(el, correct, explanation, delay=2500) {
  if (correct) {
    const pts = 10 + (GS.streak * 2);
    GS.score += pts;
    GS.streak++;
    if (GS.streak > GS.best) GS.best = GS.streak;
    if (GS.streak > 0 && GS.streak % 3 === 0) AUDIO.streak();
    else AUDIO.correct();
  } else {
    GS.lives--;
    GS.streak = 0;
    AUDIO.wrong();
    if (GS.lives <= 0) {
      gScheduleNext(el, delay, function(){ endGame(el); });
      return;
    }
  }
  gScheduleNext(el, delay, function(){ nextRound(el); });
}

// Hold-to-pause system
var gHoldTimer = null;
var gHoldPaused = false;
var gHoldCallback = null;
var gHoldDelay = 0;
var gHoldStart = 0;
var gHoldElapsed = 0;

function gScheduleNext(el, delay, cb) {
  gHoldCallback = cb;
  gHoldDelay = delay;
  gHoldElapsed = 0;
  gHoldPaused = false;
  GS.timer = setTimeout(cb, delay);

  // Add hold-to-pause hint to explanation elements
  var explains = el.querySelectorAll('.g-explanation');
  explains.forEach(function(exp) {
    if (exp.style.display !== 'none' && !exp.querySelector('.hold-hint')) {
      var hint = document.createElement('div');
      hint.className = 'hold-hint';
      hint.style.cssText = 'font-size:10px;color:#A67C2E;text-align:center;margin-top:8px;letter-spacing:1px;text-transform:uppercase;font-weight:700;opacity:0.7';
      hint.textContent = 'Hold to pause';
      exp.appendChild(hint);
    }
  });

  // Attach touch events to the whole screen area
  el.addEventListener('touchstart', gOnHoldStart, {passive:true});
  el.addEventListener('touchend', gOnHoldEnd, {passive:true});
  el.addEventListener('touchcancel', gOnHoldEnd, {passive:true});
}

function gOnHoldStart(e) {
  // Do not trigger if tapping a button (buttons are already disabled)
  if (!gHoldCallback) return;
  gHoldPaused = true;
  gHoldElapsed = gHoldDelay; // track remaining
  clearTimeout(GS.timer);
  GS.timer = null;
  // Visual feedback
  var el = document.getElementById('s-game');
  var hints = el ? el.querySelectorAll('.hold-hint') : [];
  hints.forEach(function(h){ h.textContent = 'Holding...'; h.style.opacity='1'; });
}

function gOnHoldEnd(e) {
  if (!gHoldCallback || !gHoldPaused) return;
  gHoldPaused = false;
  var el = document.getElementById('s-game');
  var hints = el ? el.querySelectorAll('.hold-hint') : [];
  hints.forEach(function(h){ h.textContent = 'Resuming...'; });
  // Remove touch listeners and resume after brief moment
  el.removeEventListener('touchstart', gOnHoldStart);
  el.removeEventListener('touchend', gOnHoldEnd);
  el.removeEventListener('touchcancel', gOnHoldEnd);
  var cb = gHoldCallback;
  gHoldCallback = null;
  GS.timer = setTimeout(cb, 600);
}

// ── MODE 1: THE CROSSING POINT ────────────────
function renderCrossing(el) {
  // Pick a metric and scenario
  const m = GDATA.rand(GDATA.metrics);
  // Generate a value that may or may not cross the danger line
  const scenarios = [
    // Healthy examples
    { name:m.name, val: m.healthy ? (m.result * (0.7 + Math.random()*0.4)).toFixed(2) : (m.result * (0.5+Math.random()*0.5)).toFixed(2),
      crossed: false, metric: m },
    // Danger examples - specific crossing scenarios
    { name:'LTV',            val:'1.08', crossed:true,  metric: GDATA.metrics.find(x=>x.id==='ltv') },
    { name:'Break-Even Ratio',val:'1.03', crossed:true, metric: GDATA.metrics.find(x=>x.id==='ber') },
    { name:'DSCR',           val:'0.87', crossed:true,  metric: GDATA.metrics.find(x=>x.id==='dsc') },
    { name:'Equity Multiple',val:'0.72', crossed:true,  metric: GDATA.metrics.find(x=>x.id==='emx') },
    { name:'Expense Ratio',  val:'1.12', crossed:true,  metric: GDATA.metrics.find(x=>x.id==='exp') },
    { name:'DSCR',           val:'1.35', crossed:false, metric: GDATA.metrics.find(x=>x.id==='dsc') },
    { name:'Equity Multiple',val:'2.40', crossed:false, metric: GDATA.metrics.find(x=>x.id==='emx') },
    { name:'Occupancy Rate', val:'0.91', crossed:false, metric: GDATA.metrics.find(x=>x.id==='occ') },
    { name:'Cap Rate',       val:'7.3%', crossed:false, metric: GDATA.metrics.find(x=>x.id==='cap') },
  ];

  const s = GDATA.rand(scenarios.slice(1)); // use the specific scenarios for clarity
  const hc = s.metric ? s.metric.houseColor : '#C9A84C';
  const house = s.metric ? s.metric.house : 'golden';
  GS.hintContext = { metric: s.metric ? s.metric.id : null, mode:'crossing' };
  GS.crossingMetricName = s.name;

  const crossMsg = s.crossed ?
    (s.name==='DSCR'||s.name==='Equity Multiple' ? 'Crossed below 1 — danger' : 'Crossed above 1 — danger') :
    'Within healthy range';

  el.innerHTML = `<div style="padding:20px 16px">
    ${scoreBar({metric: s.metric ? s.metric.id : null, mode:'crossing'})}
    <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#777;font-weight:700;margin-bottom:16px">⚡ The Crossing Point</div>
    <div class="g-question">Has this metric crossed the danger line?</div>
    <div style="background:#F9F6F0;border:1px solid #E2D9C8;border-left:4px solid ${hc};border-radius:10px;padding:20px;text-align:center;margin-bottom:20px">
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${hc};margin-bottom:6px">${house.toUpperCase()} HOUSE</div>
      <div style="font-size:18px;font-weight:700;color:#1A1A1A;margin-bottom:8px">${s.name}</div>
      <div style="font-size:42px;font-weight:900;font-family:Playfair Display,serif;color:#1A1A1A">${s.val}</div>
    </div>
    <button class="g-btn" id="gc-safe" onclick="gCrossAnswer(this,'safe',${s.crossed})">✅ Safe — within healthy range</button>
    <button class="g-btn" id="gc-danger" onclick="gCrossAnswer(this,'danger',${s.crossed})">⚠️ Danger — crossed the line</button>
    <div id="gc-explain" style="display:none" class="g-explanation"></div>
  </div>`;
}

function gCrossAnswer(btn, choice, crossed) {
  const el = document.getElementById('s-game');
  const correct = (choice==='danger') === crossed;
  const allBtns = el.querySelectorAll('.g-btn');
  allBtns.forEach(b => b.classList.add('disabled'));
  btn.classList.add(correct ? 'correct' : 'wrong');
  const safeBtn = el.querySelector('#gc-safe');
  const dangerBtn = el.querySelector('#gc-danger');
  if (crossed) dangerBtn.classList.add('correct');
  else safeBtn.classList.add('correct');
  const explain = el.querySelector('#gc-explain');
  explain.style.display = 'block';
  const crossesBelow = (GS.crossingMetricName==='DSCR' || GS.crossingMetricName==='Equity Multiple');
  const dir = crossesBelow ? 'below' : 'above';
  const richExplains = {
    'DSCR':            { safe:'DSCR above 1.0 means the property generates more income than its mortgage requires. At 1.35, for every dollar of debt service, the property produces $1.35 of NOI. Twenty-seven cents of cushion per dollar of obligation. The lender minimum is 1.25.', danger:'DSCR below 1.0 means the property cannot feed itself. If DSCR is 0.87, the property produces only 87 cents for every dollar of debt service owed. The remaining 13 cents comes directly out of personal income every month. This is not a performance issue — it is a structural failure.' },
    'Equity Multiple': { safe:'Equity Multiple above 1.0 means the investor received more than they put in across the entire hold. At 2.40, every dollar deployed came back as $2.40 — a 140% total return. Cash on cash measures the annual pace. Equity Multiple measures the destination.', danger:'Equity Multiple below 1.0 means the investor received less than they deployed. At 0.72, for every dollar put in, only 72 cents came back including all cash flow during the hold and net sale proceeds at exit. The full journey produced a net loss. This cannot be fixed — the deal is closed.' },
    'LTV':             { safe:'LTV below 1.0 means the property value exceeds the loan. At this level the investor has real equity. A value decline would have to be substantial before the loan exceeds the property.', danger:'LTV above 1.0 means the loan exceeds the property value. This is what underwater means. Cannot sell without bringing cash to closing. Cannot refinance because the collateral no longer covers the loan. The investor is trapped until values recover or the loan is paid down.' },
    'Break-Even Ratio':{ safe:'Break-Even Ratio below 1.0 means the property can cover all of its costs — operating and debt service combined — from its current income. The vacancy cushion is 100% minus this ratio. The lower it is, the more vacancy the property can absorb before personal checks are required.', danger:'Break-Even Ratio above 1.0 means total costs exceed gross income even at full occupancy. The property cannot cover its obligations no matter how many units are occupied. Every dollar of income still leaves a shortfall. This is a structural failure, not a vacancy problem.' },
    'Expense Ratio':   { safe:'Expense Ratio below 1.0 means operating expenses are less than gross income — the property covers its operating costs before debt service is even considered. The lower the ratio, the more income flows through to NOI.', danger:'Expense Ratio above 1.0 means operating expenses alone exceed gross income before debt service is even considered. The property loses money on operations. Adding debt service makes it worse. This is typically a sign of paper profit — the seller omitted management fees, reserves, or used inflated income.' },
    'Occupancy Rate':  { safe:'Occupancy Rate of 91% means 9 of every 10 units are producing income. This is strong performance. The question is whether it is sustainable — check local market vacancy and whether this rate has held across multiple years, not just the seller best year.', danger:'' },
    'Cap Rate':        { safe:'Cap Rate of 7.3% means the property generates 7.3 cents of NOI for every dollar of its value. This is mid-market for secondary cities. It strips out size and financing — two properties in different cities at different price points can be compared directly on this number.', danger:'' },
  };
  const rich = richExplains[GS.crossingMetricName];
  const richText = rich ? (crossed ? rich.danger : rich.safe) : '';
  const baseCorrect = '✅ Correct! +' + (10+GS.streak*2) + ' pts.';
  const baseWrong = '❌ For ' + GS.crossingMetricName + ', the danger line is crossed ' + dir + ' 1.';
  explain.innerHTML = correct ?
    baseCorrect + (richText ? ' ' + richText : ' The danger line is always 1. The metric determines which side is healthy.') :
    baseWrong + (richText ? ' ' + richText : '');
  handleAnswer(el, correct, '');
}

    { orig:'DSCR', origVal:'1.25', inv:'Debt Consumption Ratio', invAbove:false, invVal:'0.80', explain:'DSCR 1.25 inverts to Debt Consumption Ratio 0.80. Same property, same numbers. DSCR asks: does income cover debt? The answer is yes — 1.25 times over. Debt Consumption Ratio asks the same question from the other direction: what percentage of NOI goes to debt service? The answer is 80 cents of every NOI dollar. Twenty cents remains. The fraction flipped. The danger line stayed at 1.' },
    { orig:'DSCR', origVal:'0.88', inv:'Debt Consumption Ratio', invAbove:true,  invVal:'1.14', explain:'DSCR of 0.88 inverts to Debt Consumption Ratio of 1.14. DSCR below 1.0 is a crisis — the property cannot feed itself. Its inverse, Debt Consumption Ratio above 1.0, is the same crisis from the other side. The mortgage consumes more than 100% of NOI. Personal income fills the gap. Same failure. Two views of the same line.' },
    { orig:'Equity Multiple', origVal:'2.0x', inv:'Capital Fraction', invAbove:false, invVal:'0.50', explain:'Equity Multiple of 2.0 inverts to Capital Fraction of 0.50. Equity Multiple says: for every dollar deployed, $2 came back. Capital Fraction says: of every dollar received, 50 cents was original investment and 50 cents was pure gain. Same deal. The fraction flipped. The conclusion is the same — this was a successful investment that doubled the capital.' },
    { orig:'Equity Multiple', origVal:'0.75x', inv:'Capital Fraction', invAbove:true, invVal:'1.33', explain:'Equity Multiple of 0.75 inverts to Capital Fraction of 1.33. Equity Multiple below 1.0 means money was lost. Capital Fraction above 1.0 confirms it from the other direction — more original capital went in than total dollars came back. The investor received 75 cents for every dollar deployed. Capital Fraction of 1.33 means 133% of every dollar received was original investment — there was no gain at all.' },
    { orig:'Cap Rate', origVal:'7%', inv:'Income Multiplier', invAbove:true, invVal:'14.3x', explain:'Cap Rate of 7% inverts to Income Multiplier of 14.3. Cap Rate asks: how many cents of NOI per dollar of value? Answer: 7 cents. Income Multiplier asks: how many dollars of value sit behind each dollar of NOI? Answer: $14.30. This is how professionals price income properties — they apply the prevailing cap rate as a multiplier to the NOI to arrive at implied value.' },
    { orig:'Break-Even Ratio', origVal:'75%', inv:'Income Coverage Ratio', invAbove:true, invVal:'1.33x', explain:'Break-Even Ratio of 75% inverts to Income Coverage Ratio of 1.33. Break-Even Ratio asks: what fraction of gross income is consumed by all costs? Answer: 75 cents per dollar — leaving 25 cents of cushion. Income Coverage Ratio asks the same question from the other direction: how many times over does gross income cover everything the property owes? Answer: 1.33 times. Both numbers describe the same 25-cent cushion per dollar.' },
    { orig:'Expense Ratio', origVal:'42%', inv:'Income to Expense Multiple', invAbove:true, invVal:'2.38x', explain:'Expense Ratio of 42% inverts to Income to Expense Multiple of 2.38. Expense Ratio asks: what fraction of gross income goes to operating costs? Answer: 42 cents per dollar. Income to Expense Multiple asks: how many times over does gross income cover operating expenses? Answer: 2.38 times. Gross income is more than double operating expenses — healthy operations.' },
    { orig:'LTV', origVal:'80%', inv:'Value to Loan Multiple', invAbove:true, invVal:'1.25x', explain:'LTV of 80% inverts to Value to Loan Multiple of 1.25. LTV asks: what fraction of property value is claimed by the lender? Answer: 80 cents per dollar. Value to Loan Multiple asks: how many times over does the property value cover the loan? Answer: 1.25 times. Property values would have to fall 20% before the investor is underwater. That is the same information from the other side of the fraction.' },
  ];
  const p = GDATA.rand(pairs);

  el.innerHTML = `<div style="padding:20px 16px">
    ${scoreBar({metric: null, mode:'flip'})}
    <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#777;font-weight:700;margin-bottom:16px">🔄 Fraction Flip</div>
    <div class="g-question">This metric is flipped to its inverse.<br>Is the inverse result <strong>above or below 1</strong>?</div>
    <div style="background:#F9F6F0;border:1px solid #E2D9C8;border-radius:12px;padding:18px;margin-bottom:20px;text-align:center">
      <div style="font-size:13px;color:#777;margin-bottom:4px">Original</div>
      <div style="font-size:16px;font-weight:700;color:#1A1A1A">${p.orig}</div>
      <div style="font-size:36px;font-weight:900;font-family:Playfair Display,serif;color:#C9A84C">${p.origVal}</div>
      <div style="font-size:24px;color:#C9A84C;margin:8px 0">⇄</div>
      <div style="font-size:13px;color:#777;margin-bottom:4px">Inverse</div>
      <div style="font-size:16px;font-weight:700;color:#1A1A1A">${p.inv}</div>
      <div style="font-size:36px;font-weight:900;font-family:Playfair Display,serif;color:#1A1A1A">?</div>
    </div>
    <button class="g-btn" onclick="gFlipAnswer(this,false,${p.invAbove},'${p.invVal}','${p.explain.replace(/'/g,"\\'")}')">📉 Below 1</button>
    <button class="g-btn" onclick="gFlipAnswer(this,true,${p.invAbove},'${p.invVal}','${p.explain.replace(/'/g,"\\'")}')">📈 Above 1</button>
    <div id="gfl-explain" style="display:none" class="g-explanation"></div>
  </div>`;
}

function gFlipAnswer(btn, choiceAbove, correctAbove, invVal, explanation) {
  const el = document.getElementById('s-game');
  const isCorrect = choiceAbove === correctAbove;
  const allBtns = el.querySelectorAll('.g-btn');
  allBtns.forEach(b => b.classList.add('disabled'));
  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  allBtns.forEach(b => { if(b.textContent.includes(correctAbove?'Above':'Below')) b.classList.add('correct'); });
  const explain = el.querySelector('#gfl-explain');
  explain.style.display = 'block';
  explain.innerHTML = (isCorrect?`✅ Correct! +${10+GS.streak*2} pts. `:'❌ ') + `The inverse result is <strong>${invVal}</strong>. ${explanation}`;
  handleAnswer(el, isCorrect, '');
}

function renderDeal(el) {
  const deal = GDATA.deals[GS.round - 1] || GDATA.rand(GDATA.deals);
  const m = deal.metrics;
  const fmt = (v,isX) => isX ? v.toFixed(2)+'x' : (v*100).toFixed(1)+'%';

  el.innerHTML = `<div style="padding:20px 16px">
    ${scoreBar({metric: null, mode:'deal'})}
    <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#777;font-weight:700;margin-bottom:16px">🏢 Deal Table</div>
    <div class="g-question">Read the metrics. Make the call.</div>
    <div style="background:#1C1812;border-radius:12px;padding:16px;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700;color:#F5F0E8;margin-bottom:2px">${deal.name}</div>
      <div style="font-size:12px;color:#888;margin-bottom:14px">${deal.city}</div>
      ${[
        ['Occupancy Rate', fmt(m.occ,false)],
        ['Expense Ratio',  fmt(m.exp,false)],
        ['Break-Even Ratio', fmt(m.ber,false)],
        ['Cap Rate',       fmt(m.cap,false)],
        ['Cash on Cash',   fmt(m.coc,false)],
        ['DSCR',           fmt(m.dsc,true)],
      ].map(([label,val])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(245,240,232,0.08)">
          <span style="font-size:13px;color:rgba(245,240,232,0.7)">${label}</span>
          <span style="font-size:16px;font-weight:700;color:#F5C842">${val}</span>
        </div>
      `).join('')}
    </div>
    <button class="g-btn" onclick="gDealAnswer(this,'buy','${deal.verdict}','${deal.explanation.replace(/'/g,"\\'")}')">✅ Buy — numbers support it</button>
    <button class="g-btn" onclick="gDealAnswer(this,'investigate','${deal.verdict}','${deal.explanation.replace(/'/g,"\\'")}')">🔍 Investigate — need more information</button>
    <button class="g-btn" onclick="gDealAnswer(this,'pass','${deal.verdict}','${deal.explanation.replace(/'/g,"\\'")}')">❌ Pass — metrics fail</button>
    <div id="gd-explain" style="display:none" class="g-explanation"></div>
  </div>`;
}

function gDealAnswer(btn, choice, correct, explanation) {
  const el = document.getElementById('s-game');
  const isCorrect = choice === correct;
  const allBtns = el.querySelectorAll('.g-btn');
  allBtns.forEach(b => b.classList.add('disabled'));
  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  const labels = { buy:'✅ Buy', investigate:'🔍 Investigate', pass:'❌ Pass' };
  allBtns.forEach(b => { if(b.textContent.trim().startsWith(labels[correct])) b.classList.add('correct'); });
  const explain = el.querySelector('#gd-explain');
  explain.style.display = 'block';
  explain.innerHTML = (isCorrect?`✅ Correct! +${10+GS.streak*2} pts. `:'❌ ') + explanation;
  handleAnswer(el, isCorrect, '', 2400);
}


// ── HINT SYSTEM ───────────────────────────────
function showHintPanel() {
  try {
    var ctx = GS.hintContext || {};
    var sc = GS.curScenario || null;

    // Metric lookup helper
    function getMet(id) {
      for (var i=0; i<GDATA.metrics.length; i++) {
        if (GDATA.metrics[i].id===id || GDATA.metrics[i].name===id) return GDATA.metrics[i];
      }
      return null;
    }

    // Threshold answers for any metric by name
    var thresholds = {
      'Occupancy Rate':    'Below 80% demands investigation. Crossing above 100% is mathematically impossible.',
      'Vacancy Rate':      'Never underwrite at zero. Always use the local market rate. In Fargo use 7%.',
      'Expense Ratio':     'Below 35% is excellent. Above 65% is dangerous. Above 100% means operating costs exceed all income.',
      'LTV':               'Below 70% is strong. Above 90% is very high risk. Above 100% means underwater — the loan exceeds the property value.',
      'Break-Even Ratio':  'Below 65% is fortress. Above 92% is the danger zone. Vacancy cushion = 100% minus this ratio.',
      'Cap Rate':          '6-8% is mid-market for secondary cities. Above 10% in a stable market warrants investigation.',
      'GRM':               'Below 8x is strong. Above 15x almost certainly will not cash flow on conventional financing.',
      'One Percent Rule':  '1% passes the filter. Below 0.7% is a concern. A screen, not a verdict.',
      'Cash on Cash Return':'Below 5% is weak. 8%+ is where serious investors set their floor.',
      'Cash on Cash':      'Below 5% is weak. 8%+ is where serious investors set their floor.',
      'Debt Yield':        'Below 8% most commercial lenders will not engage. 10%+ is the standard minimum.',
      'DSCR':              'Below 1.0 the property is failing. 1.25 is the lender minimum. 1.5 is comfortable. 2.0+ is fortress.',
      'Equity Multiple':   'Below 1x means money was lost. 2x+ is the target. 4x+ is excellent.'
    };

    var crossDir = {
      'DSCR':'Crossing BELOW 1 is the crisis. DSCR below 1.0 means the property cannot feed itself.',
      'Equity Multiple':'Crossing BELOW 1 is the crisis. Below 1x means the investor received less than they deployed.',
      'LTV':'Crossing ABOVE 1 means the loan exceeds the property value. The investor is underwater.',
      'Break-Even Ratio':'Crossing ABOVE 1 means the property cannot cover costs at any occupancy level.',
      'Expense Ratio':'Crossing ABOVE 1 means operating costs exceed all gross income before debt service.'
    };

    var hints = [];

    // ── MODE: DANGER SPOTTER ──────────────────
    if (ctx.mode === 'danger' && sc && sc.metrics) {
      hints.push({ label:'Which metrics cross BELOW 1 into danger?', answer:'DSCR below 1.0 means the property cannot feed itself. Equity Multiple below 1x means money was lost.' });
      hints.push({ label:'Which metrics cross ABOVE 1 into danger?', answer:'LTV above 1.0 means underwater. Break-Even Ratio above 1.0 means costs exceed all income. Expense Ratio above 1.0 means operating costs alone exceed gross income.' });
      sc.metrics.forEach(function(met) {
        var t = thresholds[met.n];
        if (t) hints.unshift({ label:'Danger threshold: ' + met.n, answer:met.n + ' = ' + met.v + '. Threshold: ' + t });
        var cd = crossDir[met.n];
        if (cd) hints.unshift({ label:'When does ' + met.n + ' cross the line?', answer:cd });
      });
    }

    // ── MODE: WHICH PROPERTY ──────────────────
    if (ctx.mode === 'whichprop' && sc) {
      hints.push({ label:'What does DSCR tell a lender?', answer:'DSCR = NOI divided by Annual Debt Service. Below 1.0 the property is failing. 1.25 is the lender minimum. Below this most commercial lenders will not engage.' });
      hints.push({ label:'What does Break-Even Ratio tell you?', answer:'Break-Even Ratio = Total Costs divided by Gross Income. Below 65% is fortress. Above 92% is danger zone. Vacancy cushion = 100% minus this ratio.' });
      hints.push({ label:'Why can two properties have the same Cap Rate but different Cash on Cash?', answer:'Cap Rate uses property value as denominator. Cash on Cash uses your personal capital deployed. A larger down payment reduces Cash on Cash without changing Cap Rate. Same property, different personal capital efficiency.' });
      hints.push({ label:'What does Equity Multiple tell you that Cash on Cash does not?', answer:'Cash on Cash measures annual yield — the pace. Equity Multiple measures total wealth created across the entire hold including the sale — the destination. A property can have strong Cash on Cash but weak Equity Multiple if appreciation was flat.' });
      hints.push({ label:'What does LTV above 1 mean?', answer:'The loan exceeds the property value. The investor is underwater. Cannot sell without bringing cash to closing. Cannot refinance because the collateral no longer covers the loan.' });
      hints.push({ label:'What does Debt Yield measure that DSCR does not?', answer:'Debt Yield = NOI divided by Loan Amount. It is rate-independent — it does not change when interest rates move. DSCR changes when rates change because the payment changes. Lenders use Debt Yield to assess loan size regardless of the rate environment.' });
    }

    // ── MODE: NEXT STEP ───────────────────────
    if (ctx.mode === 'nextstep' && sc) {
      hints.push({ label:'What is the waterfall sequence?', answer:'Gross Potential Rent minus Loss to Lease equals Gross Income. Gross Income minus Vacancy Loss equals Effective Gross Income. EGI minus Operating Expenses equals NOI. NOI minus Annual Debt Service equals Cash Flow.' });
      hints.push({ label:'Why can you never skip a waterfall step?', answer:'Each line feeds the next. NOI requires EGI. EGI requires Gross Income. Gross Income requires GPR minus Loss to Lease. Skipping any step produces a number built on an assumption, not a calculation.' });
      hints.push({ label:'What is the difference between Cap Rate and Cash on Cash?', answer:'Cap Rate = NOI divided by Property Value. It measures the property. Cash on Cash = Annual Cash Flow divided by Total Cash Invested. It measures YOUR money. Same property can produce very different results depending on how much you put down.' });
      hints.push({ label:'What is Debt Yield and why is it rate-independent?', answer:'Debt Yield = NOI divided by Loan Amount. The loan amount is fixed at closing. It does not change when interest rates move. DSCR changes with rates because the payment changes. Debt Yield does not.' });
      hints.push({ label:'What is the difference between NOI and Cash Flow?', answer:'NOI = Effective Gross Income minus Operating Expenses. It is the property earnings before financing. Cash Flow = NOI minus Annual Debt Service. It is what lands in the investor pocket after the mortgage.' });
      hints.push({ label:'What is Total Cash Invested?', answer:'Down payment plus closing costs plus inspection fees plus immediate repairs plus carrying costs during vacancy before first rent collection. Not the loan amount. Not just the down payment.' });
    }

    // ── MODE: TRUE OR FALSE ───────────────────
    if (ctx.mode === 'truefalse' && sc) {
      hints.push({ label:'What are the Golden House metrics?', answer:'Occupancy Rate, Vacancy Rate, Expense Ratio, LTV, Break-Even Ratio. Trigger word: out of. Part out of whole.' });
      hints.push({ label:'What are the Green House metrics?', answer:'Cap Rate, GRM, One Percent Rule, Cash on Cash Return, Debt Yield, Equity Multiple. Trigger word: per.' });
      hints.push({ label:'What is the Purple House metric?', answer:'DSCR. NOI divided by Annual Debt Service. Two independent figures weighed against each other.' });
      hints.push({ label:'Key things that are NOT included in NOI', answer:'NOI excludes debt service entirely. NOI = EGI minus Operating Expenses. Annual Debt Service is subtracted after NOI to get Cash Flow.' });
      hints.push({ label:'Key things that are NOT included in Expense Ratio', answer:'Expense Ratio uses Operating Expenses only — not debt service. Only the Break-Even Ratio deliberately combines operating costs and financing costs.' });
      hints.push({ label:'What is Total Cash Invested vs Down Payment?', answer:'Total Cash Invested includes the down payment plus closing costs, inspection fees, immediate repairs, and carrying costs during vacancy. The down payment alone understates what you actually deployed.' });
      hints.push({ label:'What is Effective Gross Income?', answer:'EGI = Gross Income minus Vacancy Loss. It is the most honest income number in the waterfall. Always lower than Gross Potential Rent.' });
    }

    // ── MODE: FIX THE FORMULA ─────────────────
    if (ctx.mode === 'fixformula' && sc) {
      var met = getMet(sc.metric);
      if (met) {
        hints.unshift({ label:'What is the correct ' + sc.metric + ' formula?', answer:sc.metric + ' = ' + met.num + ' divided by ' + met.den });
        hints.unshift({ label:'Which house is ' + sc.metric + ' in?', answer:sc.metric + ' belongs to the ' + met.house.charAt(0).toUpperCase() + met.house.slice(1) + ' House.' });
        hints.unshift({ label:'What is the inverse of ' + sc.metric + '?', answer:'Inverse of ' + sc.metric + ' is ' + met.invName + '. Formula: ' + met.invNum + ' divided by ' + met.invDen });
      }
      hints.push({ label:'Common formula errors to watch for', answer:'Swapped numerator and denominator (creates the inverse formula). Wrong denominator — Cap Rate uses Property Value, Debt Yield uses Loan Amount (easy to confuse). Break-Even uses Total Costs not just Operating Expenses.' });
      hints.push({ label:'What is Total Costs in Break-Even Ratio?', answer:'Total Costs = Operating Expenses PLUS Annual Debt Service. This is the only formula that deliberately combines both. Expense Ratio uses Operating Expenses alone.' });
      hints.push({ label:'What is the difference between Cap Rate and Debt Yield denominators?', answer:'Cap Rate denominator is Property Value. Debt Yield denominator is Loan Amount. Both have NOI as the numerator. Easy to confuse.' });
    }

    // ── MODE: NAME THAT METRIC ────────────────
    if (ctx.mode === 'namemetric') {
      hints.push({ label:'List all 12 metric names', answer:'Golden House: Occupancy Rate, Vacancy Rate, Expense Ratio, LTV, Break-Even Ratio. Green House: Cap Rate, GRM, One Percent Rule, Cash on Cash Return, Debt Yield, Equity Multiple. Purple House: DSCR.' });
      hints.push({ label:'Which metric uses Loan Amount as denominator?', answer:'Debt Yield = NOI divided by Loan Amount. Not Cap Rate (which uses Property Value). Not LTV (which uses Property Value). Debt Yield is the only Green House metric using Loan Amount.' });
      hints.push({ label:'Which metric cannot be calculated until exit?', answer:'Equity Multiple. It requires Total Cash Returned which includes net sale proceeds — those do not exist until the property is sold.' });
      hints.push({ label:'Which metric is the 10-second filter?', answer:'One Percent Rule = Monthly Rent divided by Purchase Price. Requires no expense data. Just rent and price. A first-glance filter, not a verdict.' });
      hints.push({ label:'Which metric measures pure productivity stripped of size and financing?', answer:'Cap Rate = NOI divided by Property Value. Lets you compare a $200K house to a $20M building on equal terms.' });
    }

    // ── MODE: WATERFALL BUILDER ───────────────
    if (ctx.mode === 'waterfall') {
      hints.push({ label:'Show me the full waterfall sequence', answer:'1. Gross Potential Rent. 2. Minus Loss to Lease. 3. Equals Gross Income. 4. Minus Vacancy Loss. 5. Equals Effective Gross Income. 6. Minus Operating Expenses. 7. Equals NOI. 8. Minus Annual Debt Service. 9. Equals Cash Flow.' });
      hints.push({ label:'What is Loss to Lease?', answer:'Loss to Lease = Market Rent minus Actual Rent Collected, multiplied by affected units, multiplied by 12. Not a cost — it is unrealized income. Tenants paying below market rate.' });
      hints.push({ label:'What is Effective Gross Income?', answer:'EGI = Gross Income minus Vacancy Loss. The most honest income number in the waterfall. Always lower than Gross Income. Never underwrite on Gross Potential Rent.' });
      hints.push({ label:'What is NOI and what does it exclude?', answer:'NOI = EGI minus Operating Expenses. Property earnings before financing. It explicitly excludes mortgage principal and interest. Debt service is subtracted after NOI to get Cash Flow.' });
      hints.push({ label:'What comes after NOI?', answer:'Annual Debt Service is subtracted after NOI. Annual Debt Service = monthly P and I payment multiplied by 12. The result is Cash Flow — what lands in the investor pocket.' });
    }

    // ── METRIC-SPECIFIC HINTS (modes 1-8) ─────
    var formulaComponents = {
      'occ': { num:'Occupied Units — the number of units currently rented and producing income.', den:'Total Units — the full unit count of the building. This is always the ceiling. Occupancy Rate can never exceed 1.0.' },
      'vac': { num:'Vacant Units — units currently empty and producing no income.', den:'Total Units — the full unit count. Never use zero for vacancy in underwriting. Always use the local market rate from three independent property managers.' },
      'exp': { num:'Operating Expenses — all costs to operate the property excluding debt service. Includes property taxes, insurance, management fees at 8-10% of gross income, maintenance, capital expenditure reserves, utilities paid by landlord, and professional fees. Does not include mortgage payments.', den:'Gross Income — actual rent collected under current leases over twelve months. Not Gross Potential Rent. Not the seller best year. If the seller self-manages, add management fees before trusting this ratio.' },
      'ltv': { num:'Loan Amount — the outstanding principal balance on the mortgage. Not the original loan amount unless no payments have been made.', den:'Property Value — current appraised or market value. LTV is the only Golden House metric that can cross above 1.0. When property values fall below the loan balance the investor is underwater.' },
      'ber': { num:'Total Costs — Operating Expenses PLUS Annual Debt Service. This is the only formula in the three houses that deliberately combines both operating costs and financing costs into one number. Total Costs is not the same as Operating Expenses alone.', den:'Gross Income — actual rent collected under current leases. The vacancy cushion equals 100% minus this ratio. Below 65% is fortress. Above 92% is the danger zone.' },
      'cap': { num:'NOI — Net Operating Income. Effective Gross Income minus Operating Expenses. The property earnings before financing. Never accept the seller NOI without rebuilding it from honest expenses. Add management fees, capital reserves, and apply real vacancy.', den:'Property Value — the purchase price or current market value. Cap Rate strips out size and financing. Two properties at any price point can be compared directly on this number.' },
      'grm': { num:'Purchase Price — the total acquisition cost of the property.', den:'Annual Gross Rent — total rent collected annually at current lease rates. Not Gross Potential Rent. If rents are below market, GRM will look worse than the property true potential. If above market, it will look better than it deserves.' },
      'opr': { num:'Monthly Rent — total monthly rent collected across all units at current rates.', den:'Purchase Price — the total acquisition cost. This is a 10-second filter only. It requires no expense data. Passing does not make a deal good. Failing does not make a deal bad.' },
      'coc': { num:'Annual Cash Flow — NOI minus Annual Debt Service. What lands in the investor pocket after all costs including the mortgage. This is the bottom line of the waterfall.', den:'Total Cash Invested — every dollar put in from personal funds. Down payment PLUS closing costs PLUS inspection fees PLUS immediate repairs PLUS carrying costs during vacancy before first rent collection. Not just the down payment. Using only the down payment flatters this result.' },
      'dby': { num:'NOI — Net Operating Income. Same as Cap Rate numerator. Property earnings before financing.', den:'Loan Amount — the outstanding principal on the mortgage. Not the property value. This is what distinguishes Debt Yield from Cap Rate. Debt Yield is rate-independent — it does not change when interest rates move because the loan amount does not change with rates.' },
      'emx': { num:'Total Cash Returned — every dollar received from first day of ownership through final sale. All annual cash flow during the hold period plus net sale proceeds after paying off the remaining loan balance and all closing costs of sale.', den:'Total Cash Invested — same as Cash on Cash denominator. Cannot be calculated until exit because Total Cash Returned includes sale proceeds that do not exist until the property is sold.' },
      'dsc': { num:'NOI — Net Operating Income. Set by tenants, vacancy, and operating costs. Moves constantly. A tenant leaves and NOI drops. Rents rise and NOI climbs.', den:'Annual Debt Service — monthly principal and interest payment multiplied by twelve. Locked in at closing by the lender. Does not change unless there is a refinance. Does not include taxes or insurance even if escrowed.' }
    };
    var m = null;
    if (ctx.metric) m = getMet(ctx.metric);
    if (m) {
      var fc = formulaComponents[m.id];
      if (fc) {
        hints.unshift({ label:'What does the denominator of ' + m.name + ' mean?', answer:fc.den });
        hints.unshift({ label:'What does the numerator of ' + m.name + ' mean?', answer:fc.num });
      }
      hints.unshift({ label:'What is the ' + m.name + ' benchmark?', answer:m.benchStr });
      hints.unshift({ label:'What is the inverse of ' + m.name + '?', answer:'The inverse of ' + m.name + ' is ' + m.invName + '. Formula: ' + m.invNum + ' divided by ' + m.invDen + '.' });
      hints.unshift({ label:'Which house is ' + m.name + ' in?', answer:m.name + ' belongs to the ' + m.house.charAt(0).toUpperCase() + m.house.slice(1) + ' House.' });
      hints.unshift({ label:'Show me the ' + m.name + ' formula', answer:m.name + ' = ' + m.num + ' divided by ' + m.den });
    }

    // ── EXISTING MODE HINTS (modes 1-8) ───────
    if (ctx.mode === 'crossing') {
      hints.push({ label:'Which metrics must stay BELOW 1?', answer:'Occupancy Rate, Vacancy Rate, Expense Ratio, LTV, Break-Even Ratio, Cap Rate, Cash on Cash Return, One Percent Rule, Debt Yield.' });
      hints.push({ label:'Which metrics must rise ABOVE 1?', answer:'DSCR must exceed 1.0 or the property cannot feed itself. Equity Multiple must exceed 1.0 or money was lost.' });
    }
    if (ctx.mode === 'housesort') {
      hints.push({ label:'Golden House metrics', answer:'Occupancy Rate, Vacancy Rate, Expense Ratio, LTV, Break-Even Ratio. Trigger: out of.' });
      hints.push({ label:'Green House metrics', answer:'Cap Rate, GRM, One Percent Rule, Cash on Cash Return, Debt Yield, Equity Multiple. Trigger: per.' });
      hints.push({ label:'Purple House metric', answer:'DSCR only. Two independent figures weighed against each other.' });
    }
    if (ctx.mode === 'match' || ctx.mode === 'formula') {
      hints.push({ label:'List all inverse names', answer:'Occupancy Multiple, Vacancy Multiple, Income to Expense Multiple, Value to Loan Multiple, Income Coverage Ratio, Income Multiplier, Gross Rent Yield, Price to Rent Multiple, Payback Period, Loan to Income Multiple, Capital Fraction, Debt Consumption Ratio.' });
    }
    if (ctx.mode === 'bench') {

  ],

  waterfallSteps: [
    { text:'Gross Potential Rent', note:'All units at market rent × 12. The income ceiling.', order:0 },
    { text:'minus Loss to Lease', note:'Market rent minus actual rent × affected units × 12. Not a cost — unrealized income.', order:1 },
    { text:'equals Gross Income', note:'Actual rent collected under current leases.', order:2 },
    { text:'minus Vacancy Loss', note:'Gross Income × local market vacancy rate. Never use zero.', order:3 },
    { text:'equals Effective Gross Income', note:'The most honest income number in the waterfall.', order:4 },
    { text:'minus Operating Expenses', note:'All costs to operate excluding debt service.', order:5 },
    { text:'equals NOI', note:'Property earnings before financing.', order:6 },
    { text:'minus Annual Debt Service', note:'Monthly P&I × 12. Does not include taxes or insurance.', order:7 },
    { text:'equals Cash Flow', note:'What lands in the investor pocket.', order:8 },
  ],

  rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; },
  shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); },

  // No-repeat pool system — cycles through all items before repeating
  _pools: {},
  pick(key) {
    var arr = this[key];
    if (!arr || !arr.length) return null;
    if (!this._pools[key] || this._pools[key].length === 0) {
      this._pools[key] = this.shuffle([...arr.map((_,i)=>i)]);
    }
    var idx = this._pools[key].pop();
    return arr[idx];
  },
  resetPools() { this._pools = {}; }
};

let WF = { correctOrder:[], remaining:[], built:[] };

function renderWaterfallBuilder(el) {
  const all = GNEW.waterfallSteps;
  WF.correctOrder = all.map(s=>s.text);
  WF.built = [];
  WF.remaining = GNEW.shuffle([...all]);

  el.innerHTML = `<div style="padding:20px 16px">
    ${scoreBar({metric:null,mode:'waterfall'})}
    <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#777;font-weight:700;margin-bottom:10px">💧 Waterfall Builder</div>

    <div id="wf-built" style="background:#1C1812;border-radius:10px;padding:12px;margin-bottom:12px;min-height:40px">
      <div style="font-size:10px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Built so far</div>
      <div id="wf-built-list" style="font-size:12px;color:#F5C842"></div>
    </div>
    <div id="wf-pool"></div>
    <div id="gwf-explain" style="display:none" class="g-explanation"></div>
  </div>`;
  renderWaterfallPool(el);
}

function renderWaterfallPool(el) {
  const pool = el.querySelector('#wf-pool');
  if (!pool) return;
  pool.innerHTML = WF.remaining.map((s,i)=>`
    <button class="g-btn" onclick="gWFTap(${i})" style="font-size:13px">${s.text}</button>
  `).join('');
}

function gWFTap(idx) {
  const el = document.getElementById('s-game');
  const tapped = WF.remaining[idx];
  const nextCorrect = WF.correctOrder[WF.built.length];
  const isCorrect = tapped.text === nextCorrect;

  if (isCorrect) {
    AUDIO.correct();
    WF.built.push(tapped);
    WF.remaining.splice(idx,1);
    const builtList = el.querySelector('#wf-built-list');
    if (builtList) builtList.innerHTML = WF.built.map(s=>`<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.08)">${s.text}<span style="font-size:10px;color:#888;margin-left:6px">${s.note}</span></div>`).join('');

    if (WF.remaining.length === 0) {
      GS.score += 30 + (GS.streak * 2);
      GS.streak++;
      if (GS.streak > GS.best) GS.best = GS.streak;
      if (GS.streak % 3 === 0) AUDIO.streak();
      const exp = el.querySelector('#gwf-explain');
      if (exp) { exp.style.display='block'; exp.innerHTML='✅ Perfect waterfall! Every step in the correct sequence. +30 pts.'; }
      setTimeout(()=>nextRound(el), 2000);
    } else {
      renderWaterfallPool(el);
    }
  } else {
    AUDIO.wrong();
    GS.lives--;
    GS.streak = 0;
    const btn = el.querySelectorAll('#wf-pool .g-btn')[idx];
    if (btn) { btn.classList.add('wrong'); btn.classList.add('disabled'); }
    const exp = el.querySelector('#gwf-explain');
    if (exp) { exp.style.display='block'; exp.innerHTML=`❌ The next step is: <strong>${nextCorrect}</strong>`; }
    if (GS.lives <= 0) { setTimeout(()=>endGame(el), 1500); }
    else {
      setTimeout(()=>{
        if(exp) exp.style.display='none';
        renderWaterfallPool(el);
      }, 1500);
    }
    const sb = el.querySelector('.g-score-bar');
    if (sb && sb.parentElement) {
      const livesDiv = sb.parentElement.querySelector('.g-lives');
      if (livesDiv) { var ml=GS.unlimited?5:3; livesDiv.innerHTML='❤️'.repeat(Math.max(0,GS.lives))+'🖤'.repeat(Math.max(0,ml-GS.lives)); }
    }
  }
}

function showOnboarding(step) {
  OB_STEP = (typeof step === 'number') ? step : 0;
  var existing = document.getElementById('ob-overlay');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.id = 'ob-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(28,24,18,0.85);z-index:10000;display:flex;align-items:flex-end;';

  var sheet = document.createElement('div');
  sheet.style.cssText = 'background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;transition:transform 0.25s ease;';

  // Header bar
  var header = document.createElement('div');
  header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px;border-bottom:1px solid #F0EAE0;flex-shrink:0;';

  // Tappable dots
  var dotsWrap = document.createElement('div');
  dotsWrap.style.cssText = 'display:flex;align-items:center;gap:4px;';
  for (var i=0; i<OB_TOTAL; i++) {
    (function(idx) {
      var dot = document.createElement('div');
      dot.style.cssText = 'width:' + (idx===OB_STEP?'20px':'6px') + ';height:6px;border-radius:3px;background:' + (idx===OB_STEP?'#C9A84C':'#E2D9C8') + ';transition:all 0.3s;cursor:pointer;';
      dot.addEventListener('click', function() { showOnboarding(idx); });
      dotsWrap.appendChild(dot);
    })(i);
  }
  header.appendChild(dotsWrap);

  var skipBtn = document.createElement('button');
  skipBtn.textContent = OB_STEP === OB_TOTAL-1 ? '' : 'Skip tour';
  skipBtn.style.cssText = 'background:none;border:none;font-size:12px;color:#999;cursor:pointer;font-family:DM Sans,sans-serif;padding:4px 0;';
  skipBtn.addEventListener('click', function() { closeOnboarding(); });
  header.appendChild(skipBtn);

  var obContent = document.createElement('div');
  obContent.style.cssText = 'flex:1;overflow-y:auto;padding:20px 20px 0;-webkit-overflow-scrolling:touch;';

  // Swipe detection on the sheet
  var swipeStartX = 0;
  var swipeStartY = 0;
  var swipeActive = false;
  sheet.addEventListener('touchstart', function(e) {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
    swipeActive = true;
  }, {passive:true});
  sheet.addEventListener('touchend', function(e) {
    if (!swipeActive) return;
    swipeActive = false;
    var dx = e.changedTouches[0].clientX - swipeStartX;
    var dy = e.changedTouches[0].clientY - swipeStartY;
    // Only register horizontal swipes (dx > dy and dx significant)
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0 && OB_STEP < OB_TOTAL-1) {
        // Swipe left — next
        showOnboarding(OB_STEP+1);
      } else if (dx > 0 && OB_STEP > 0) {
        // Swipe right — previous
        showOnboarding(OB_STEP-1);
      }
    }
  }, {passive:true});
}

function closeOnboarding() {
  var d = STORE.get();
  d.onboardingSeen = true;
  STORE.save(d);
  var el = document.getElementById('ob-overlay');
  if (el) el.remove();
}

function daCollectInputs() {
  var fields = ['da-name','da-units','da-rent','da-ltl','da-vac','da-opex','da-price','da-loan','da-ads','da-tci','da-hold','da-sale'];
  var keys   = ['dealName','units','monthlyRentPerUnit','lossToLease','vacancyRate','opEx','purchasePrice','loanAmount','annualDebtService','totalCashInvested','holdYears','projectedSalePrice'];
  fields.forEach(function(id, i) {
    var el = document.getElementById(id);
    if (el) DAState.inputs[keys[i]] = el.value;
  });
}

function daAnalyze() {
  daCollectInputs();
  var inp = DAState.inputs;
  var missing = [];
  if (!inp.units || !inp.monthlyRentPerUnit) missing.push('units and monthly rent');
  if (!inp.opEx) missing.push('operating expenses');
  if (!inp.purchasePrice) missing.push('purchase price');
  if (!inp.loanAmount) missing.push('loan amount');
  if (!inp.annualDebtService) missing.push('annual debt service');
  if (!inp.totalCashInvested) missing.push('total cash invested');
  if (missing.length > 0) {
    alert('Please enter: ' + missing.join(', '));
    return;

function daSaveSlot(idx) {
  daCollectInputs();

function daLoadSlot(idx) {

function renderDealResults(el) {
  var inp = DAState.inputs;

  // ── Waterfall calculations ──
  var units = parseFloat(inp.units) || 0;
  var rentPerUnit = parseFloat(inp.monthlyRentPerUnit) || 0;
  var gpr = units * rentPerUnit * 12;
  var lossToLease = parseFloat(inp.lossToLease) || 0;
  var grossIncome = gpr - lossToLease;
  var vacRate = (parseFloat(inp.vacancyRate) || 7) / 100;
  var vacLoss = grossIncome * vacRate;
  var egi = grossIncome - vacLoss;
  var opEx = parseFloat(inp.opEx) || 0;
  var noi = egi - opEx;
  var ads = parseFloat(inp.annualDebtService) || 0;
  var cashFlow = noi - ads;
  var purchasePrice = parseFloat(inp.purchasePrice) || 0;
  var loanAmount = parseFloat(inp.loanAmount) || 0;
  var tci = parseFloat(inp.totalCashInvested) || 0;
  var holdYears = parseFloat(inp.holdYears) || 5;
  var salePrice = parseFloat(inp.projectedSalePrice) || 0;
  var totalCosts = opEx + ads;

  // ── Metric calculations ──
  var occRate    = units > 0 ? ((units * (1-vacRate)) / units) : null;
  var vacRateVal = vacRate;
  var expRatio   = grossIncome > 0 ? opEx / grossIncome : null;
  var ltv        = purchasePrice > 0 ? loanAmount / purchasePrice : null;
  var ber        = grossIncome > 0 ? totalCosts / grossIncome : null;
  var capRate    = purchasePrice > 0 ? noi / purchasePrice : null;
  var grm        = grossIncome > 0 ? purchasePrice / grossIncome : null;
  var opr        = purchasePrice > 0 ? (rentPerUnit / purchasePrice) : null;
  var coc        = tci > 0 ? cashFlow / tci : null;
  var debtYield  = loanAmount > 0 ? noi / loanAmount : null;
  var dscr       = ads > 0 ? noi / ads : null;

  // Equity Multiple — needs sale price
  var emx = null;
  var loanBalance = loanAmount; // simplified — assume interest-only or use remaining balance
  var estimatedLoanBalance = loanAmount * 0.92; // rough 5yr paydown approximation
  if (salePrice > 0 && tci > 0) {
    var annualCFTotal = cashFlow * holdYears;
    var saleProceeds = salePrice - estimatedLoanBalance - (salePrice * 0.06); // 6% closing costs
    var totalReturned = annualCFTotal + saleProceeds;
    emx = tci > 0 ? totalReturned / tci : null;
  }

  // ── Helper functions ──
  function fmt$(n) { return n < 0 ? '-$' + Math.abs(Math.round(n)).toLocaleString() : '$' + Math.round(n).toLocaleString(); }
  function fmtPct(n) { return (n*100).toFixed(1) + '%'; }
  function fmtX(n) { return n.toFixed(2) + 'x'; }

  // ── Badge logic ──
  function badge(label, color, bg) {
    return '<span style="display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:' + bg + ';color:' + color + '">' + label + '</span>';
  }
  function getBadge(id, val) {
    if (val === null) return badge('N/A','#999','#F5F0E8');
    var ranges = {
      capRate:   function(v){ if(v>=0.06&&v<=0.08) return ['Strong','#166534','#DCFCE7']; if(v>0.08&&v<=0.10) return ['Good','#92400E','#FEF3C7']; if(v>0.10) return ['Investigate','#991B1B','#FEE2E2']; return ['Weak','#92400E','#FEF3C7']; },
      grm:       function(v){ if(v<8) return ['Strong','#166534','#DCFCE7']; if(v<=12) return ['Acceptable','#92400E','#FEF3C7']; return ['Danger','#991B1B','#FEE2E2']; },
      opr:       function(v){ if(v>=0.01) return ['Passes','#166534','#DCFCE7']; if(v>=0.007) return ['Borderline','#92400E','#FEF3C7']; return ['Fails','#991B1B','#FEE2E2']; },
      coc:       function(v){ if(v>=0.08) return ['Strong','#166534','#DCFCE7']; if(v>=0.05) return ['Acceptable','#92400E','#FEF3C7']; return ['Weak','#991B1B','#FEE2E2']; },
      debtYield: function(v){ if(v>=0.10) return ['Strong','#166534','#DCFCE7']; if(v>=0.08) return ['Acceptable','#92400E','#FEF3C7']; return ['Danger','#991B1B','#FEE2E2']; },
      emx:       function(v){ if(v>=2.0) return ['Strong','#166534','#DCFCE7']; if(v>=1.0) return ['Acceptable','#92400E','#FEF3C7']; return ['Loss','#991B1B','#FEE2E2']; },
      occRate:   function(v){ if(v>=0.90) return ['Strong','#166534','#DCFCE7']; if(v>=0.80) return ['Acceptable','#92400E','#FEF3C7']; return ['Weak','#991B1B','#FEE2E2']; },
      vacRate:   function(v){ if(v<=0.05) return ['Low','#166534','#DCFCE7']; if(v<=0.10) return ['Normal','#92400E','#FEF3C7']; return ['High','#991B1B','#FEE2E2']; },
      expRatio:  function(v){ if(v<=0.35) return ['Excellent','#166534','#DCFCE7']; if(v<=0.65) return ['Acceptable','#92400E','#FEF3C7']; return ['Danger','#991B1B','#FEE2E2']; },
      ltv:       function(v){ if(v<=0.70) return ['Strong','#166534','#DCFCE7']; if(v<=0.80) return ['Acceptable','#92400E','#FEF3C7']; return ['High Risk','#991B1B','#FEE2E2']; },
      ber:       function(v){ if(v<=0.65) return ['Fortress','#166534','#DCFCE7']; if(v<=0.80) return ['Acceptable','#92400E','#FEF3C7']; return ['Danger','#991B1B','#FEE2E2']; },
      dscr:      function(v){ if(v>=1.5) return ['Strong','#166534','#DCFCE7']; if(v>=1.25) return ['Acceptable','#92400E','#FEF3C7']; if(v>=1.0) return ['Below Min','#991B1B','#FEE2E2']; return ['Failing','#991B1B','#FEE2E2']; },
    };
    var fn = ranges[id];
    if (!fn) return badge('—','#999','#F5F0E8');
    var r = fn(val);
    return badge(r[0], r[1], r[2]);
  }

  // ── Commentary logic ──
  function commentary(id, val) {
    if (val === null) return 'Insufficient data to calculate.';
    var v = val;
    var c = {
      capRate: function(){
        if(v>0.10) return 'Cap rate above 10% in a stable market warrants investigation. The market is pricing this income at a discount — check why. Common causes: deferred maintenance, weak tenants, or location concerns. Verify NOI is built from honest expenses before trusting this number.';
        if(v>=0.06&&v<=0.08) return 'Cap rate of ' + fmtPct(v) + ' is mid-market for secondary cities like Fargo. This strips out size and financing — two properties at any price point can be compared directly on this number. Confirm NOI excludes management fees and capital reserves from the seller numbers.';
        if(v>0.08) return 'Cap rate of ' + fmtPct(v) + ' is above the 6-8% mid-market range. Strong productivity per dollar of value. Ensure the NOI is built from honest expenses — a broker 9% often becomes 6-7% once real costs are applied.';
        return 'Cap rate of ' + fmtPct(v) + ' is below the 6% floor for secondary cities. Low yield relative to price. Either the purchase price is too high or the income is too thin. Compare against local market rates before proceeding.';
      },
      grm: function(){
        if(v<8) return 'GRM of ' + fmtX(v) + ' is strong — below 8 times. You paid less than 8 dollars for every dollar of annual gross rent. This is a favorable price-to-rent relationship. Check whether current rents reflect market rates or if there is upside.';
        if(v<=12) return 'GRM of ' + fmtX(v) + ' is acceptable. The deal may still cash flow but the price-to-rent relationship is tightening. Run the full analysis — GRM is only a first-glance filter.';
        return 'GRM of ' + fmtX(v) + ' is above 15 times. At this price-to-rent ratio the deal almost certainly will not cash flow on conventional financing. The purchase price is too high relative to the income the property produces.';
      },
      opr: function(){
        var pct = (v*100).toFixed(2);
        if(v>=0.01) return 'One Percent Rule passes at ' + pct + '%. Monthly rent equals or exceeds 1% of the purchase price. This is a first-glance screen only — it does not make the deal good, but it warrants further analysis.';
        if(v>=0.007) return 'One Percent Rule comes in at ' + pct + '% — below the 1% threshold but above 0.7%. This is a borderline result. Do not discard the deal but apply extra scrutiny to the full waterfall analysis.';
        return 'One Percent Rule fails at ' + pct + '%. Monthly rent is less than 0.7% of the purchase price. The price-to-rent relationship is unfavorable. This is a filter, not a verdict — but it is a meaningful signal.';
      },
      coc: function(){
        if(v>=0.08) return 'Cash on cash return of ' + fmtPct(v) + ' clears the 8% floor that serious investors set. This measures YOUR money — down payment plus all out-of-pocket costs. Verify Total Cash Invested includes closing costs, inspection fees, and any immediate repairs. If it does, this is a strong personal capital return.';
        if(v>=0.05) return 'Cash on cash return of ' + fmtPct(v) + ' is above the 5% floor but below the 8% target. Acceptable but not compelling. Check whether Total Cash Invested is complete — omitting closing costs or repairs overstates this number.';
        if(v>0) return 'Cash on cash return of ' + fmtPct(v) + ' is below the 5% floor. Personal capital is underperforming. Either the purchase price is too high, the income is too thin, or the debt service is too heavy. Check whether Total Cash Invested includes all out-of-pocket costs.';
        return 'Cash on cash return is negative — ' + fmtPct(v) + '. The property is producing negative cash flow. Every month requires a personal check to cover the gap between income and total costs.';
      },
      debtYield: function(){
        if(v>=0.10) return 'Debt yield of ' + fmtPct(v) + ' clears the 10% commercial lender standard. For every dollar of loan, the property produces ' + fmtPct(v) + ' of NOI. This is rate-independent — it does not change when interest rates move. A strong result for commercial financing.';
        if(v>=0.08) return 'Debt yield of ' + fmtPct(v) + ' is between the 8% floor and the 10% standard. Some commercial lenders will engage at this level, others will not. The loan may be slightly too large relative to the income. Consider whether the loan amount can be reduced.';
        return 'Debt yield of ' + fmtPct(v) + ' is below the 8% floor. Most commercial lenders will not engage at this level. The loan amount is too large relative to the NOI the property produces. This is rate-independent — rates are not the issue. The loan-to-income relationship is the problem.';
      },
      emx: function(){
        if(v>=2.0) return 'Equity multiple of ' + fmtX(v) + ' projects that every dollar deployed returns ' + fmtX(v) + ' across the full hold including the sale. This is a projection — it depends on the projected sale price and estimated loan paydown. 2x+ is the target. Verify the sale price assumption is conservative.';
        if(v>=1.0) return 'Equity multiple of ' + fmtX(v) + ' projects a positive total return but below the 2x target. For every dollar deployed, ' + fmtX(v) + ' is projected to return. Check the projected sale price — a conservative assumption here is essential.';
        return 'Equity multiple of ' + fmtX(v) + ' projects that the investor receives LESS than they deployed across the full hold. The total return including sale proceeds is negative. Re-examine the sale price assumption, the hold period, and whether the annual cash flow is sustainable.';
      },
      occRate: function(){
        var pct = fmtPct(v);
        if(v>=0.90) return 'Occupancy rate of ' + pct + ' is strong. Nine or more of every ten units are producing income. Verify this reflects realistic ongoing performance — not a seller peak year. Always compare to local market vacancy.';
        if(v>=0.80) return 'Occupancy rate of ' + pct + ' is acceptable but warrants attention. Check whether current vacancies are lease-up situations or chronic. Below 80% demands investigation.';
        return 'Occupancy rate of ' + pct + ' is below 80% — this demands investigation. Identify why units are vacant, how long they have been vacant, and whether this is a management problem or a market problem.';
      },
      vacRate: function(){
        var pct = fmtPct(v);
        var vacNote; if(v===0.07){vacNote='The Fargo standard is 7%. This is appropriate.';}else if(v<0.05){vacNote='Below typical range. Verify with three independent property managers.';}else if(v>0.10){vacNote='Above typical range. Verify this reflects local market conditions.';}else{vacNote='Verify this reflects the local market rate from three independent property managers.';} return 'Vacancy assumption of ' + pct + ' applied. ' + vacNote;
      },
      expRatio: function(){
        if(v<=0.35) return 'Expense ratio of ' + fmtPct(v) + ' is excellent — below 35%. Operations are lean. Confirm management fees are included at 8-10% of gross income, capital expenditure reserves are included, and taxes and insurance are accurate. Sellers who self-manage often omit management fees.';
        if(v<=0.65) return 'Expense ratio of ' + fmtPct(v) + ' is within the acceptable range. The majority of gross income flows to NOI before debt service. Check that all operating costs are captured — management fees, reserves, and maintenance are commonly understated.';
        return 'Expense ratio of ' + fmtPct(v) + ' is above 65% and in the danger zone. Operations are consuming most of the gross income before debt service. Identify which expense categories are driving this — management, taxes, deferred maintenance, or utilities.';
      },
      ltv: function(){
        if(v<=0.70) return 'LTV of ' + fmtPct(v) + ' is strong — below 70%. Meaningful equity exists. A substantial value decline would be required before the loan exceeds the property value. This provides flexibility for refinancing and selling.';
        if(v<=0.80) return 'LTV of ' + fmtPct(v) + ' is standard for conventional financing. Twenty cents of every dollar of value belongs to the investor. A 20-25% value decline would create an underwater situation. Monitor property values in this market.';
        if(v<=0.90) return 'LTV of ' + fmtPct(v) + ' is above 80% — higher leverage. Less than 20 cents of equity per dollar of value. A modest value decline could threaten the ability to refinance or sell. Ensure the deal cash flows strongly enough to justify the leverage.';
        return 'LTV of ' + fmtPct(v) + ' is above 90% — very high risk. Minimal equity. A small value decline could push this underwater. Cannot sell without cash at closing. Cannot refinance without the collateral covering the loan. Reconsider the financing structure.';
      },
      ber: function(){
        var cushion = ((1-v)*100).toFixed(1);
        if(v<=0.65) return 'Break-even ratio of ' + fmtPct(v) + ' is fortress territory. The property needs only ' + fmtPct(v) + ' of gross income to cover all costs combined. Vacancy cushion is ' + cushion + '% — the property can absorb significant vacancy before personal checks are required.';
        if(v<=0.80) return 'Break-even ratio of ' + fmtPct(v) + ' is acceptable. Vacancy cushion is ' + cushion + '%. One or two units turning over at the same time will cause stress but not a crisis. Monitor operating expenses for upward drift.';
        if(v<=0.92) return 'Break-even ratio of ' + fmtPct(v) + ' is approaching the 92% danger zone. Only ' + cushion + '% vacancy cushion. A single unit sitting empty for more than a few weeks pushes the property toward the break-even point. This is thin.';
        return 'Break-even ratio of ' + fmtPct(v) + ' is in the danger zone — above 92%. Only ' + cushion + '% vacancy cushion. The property is one vacancy away from requiring personal income every month. This ratio cannot be sustained in any normal operating environment.';
      },
      dscr: function(){
        if(v>=2.0) return 'DSCR of ' + fmtX(v) + ' is fortress territory. For every dollar of debt service the property produces ' + fmtX(v) + ' of NOI. Significant cushion against vacancy, expense increases, or income disruption. Most lenders will view this favorably.';
        if(v>=1.5) return 'DSCR of ' + fmtX(v) + ' is comfortable — above 1.5. NOI covers debt service with meaningful cushion. This clears the 1.25 lender minimum with room to absorb operational stress.';
        if(v>=1.25) return 'DSCR of ' + fmtX(v) + ' clears the 1.25 lender minimum but with limited cushion. A modest vacancy spike or expense increase could push this below the minimum. This deal is viable but has less margin for error.';
        if(v>=1.0) return 'DSCR of ' + fmtX(v) + ' is above 1.0 but below the 1.25 lender minimum. Most commercial lenders will not engage at this level. The property technically covers its debt but has almost no cushion. This is a structural weakness.';
        return 'DSCR of ' + fmtX(v) + ' is below 1.0 — the property cannot feed itself. For every dollar of debt service, the property produces only ' + fmtPct(v) + '. The gap comes directly out of personal income every month. This is a structural failure.';
      }
    };
    return c[id] ? c[id]() : '';
  }

  // ── Verdict logic ──
  function getVerdict() {
    var issues = [], strengths = [], flags = [];
    if (dscr !== null) { if(dscr<1.0) issues.push('DSCR below 1.0 — property cannot feed itself'); else if(dscr<1.25) flags.push('DSCR below lender minimum of 1.25'); }
    if (ber !== null) { if(ber>0.92) issues.push('Break-even ratio in danger zone — minimal vacancy cushion'); else if(ber>0.80) flags.push('Break-even ratio above 80% — limited cushion'); }
    if (capRate !== null) { if(capRate>0.10) flags.push('Cap rate above 10% — warrants investigation'); else if(capRate>=0.06) strengths.push('Cap rate in target range'); }
    if (coc !== null) { if(coc<0) issues.push('Negative cash on cash — property produces negative cash flow'); else if(coc<0.05) flags.push('Cash on cash below 5% floor'); else if(coc>=0.08) strengths.push('Cash on cash above 8% floor'); }
    if (ltv !== null) { if(ltv>0.90) flags.push('LTV above 90% — very high leverage'); }
    if (debtYield !== null) { if(debtYield<0.08) issues.push('Debt yield below 8% — most lenders will not engage'); }

    var verdict, color, bg;
    if (issues.length >= 2) { verdict='Pass'; color='#991B1B'; bg='#FEE2E2'; }
    else if (issues.length === 1 || flags.length >= 2) { verdict='Investigate'; color='#92400E'; bg='#FEF3C7'; }
    else if (strengths.length >= 2 && flags.length === 0 && issues.length === 0) { verdict='Buy'; color='#166534'; bg='#DCFCE7'; }
    else { verdict='Investigate'; color='#92400E'; bg='#FEF3C7'; }

    return { verdict:verdict, color:color, bg:bg, issues:issues, flags:flags, strengths:strengths };
  }

  // ── Build results HTML ──

  // Waterfall section

// GLOBAL NAVIGATION HISTORY
// Back / Forward arrows bottom left and right
// ═══════════════════════════════════════════════
var NAV = {
  stack: [],   // array of state objects
  pos: -1,     // current position in stack
  isPushing: false,

  push: function(state) {
    if (this.isPushing) return;
    // Truncate forward history when navigating somewhere new
    this.stack = this.stack.slice(0, this.pos + 1);
    this.stack.push(state);
    this.pos = this.stack.length - 1;
    this.update();
  },

  back: function() {
    if (this.pos <= 0) return;
    this.pos--;
    this.restore(this.stack[this.pos]);
    this.update();
  },

  fwd: function() {
    if (this.pos >= this.stack.length - 1) return;
    this.pos++;
    this.restore(this.stack[this.pos]);
    this.update();
  },

  update: function() {
    var backBtn = document.getElementById('nav-back');
    var fwdBtn  = document.getElementById('nav-fwd');
    if (backBtn) backBtn.disabled = this.pos <= 0;
    if (fwdBtn)  fwdBtn.disabled  = this.pos >= this.stack.length - 1;
  },

  restore: function(state) {
    this.isPushing = true;
    try {
      if (state.screen) {
        // Restore screen state
        document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
        document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
        var screenEl = document.getElementById('s-' + state.screen);
        var navBtn = document.querySelector('[data-screen="' + state.screen + '"]');
        if (screenEl) screenEl.classList.add('active');
        if (navBtn) navBtn.classList.add('active');
        currentScreen = state.screen;
        document.getElementById('screen-wrap').scrollTop = state.scrollTop || 0;

        // Restore screen-specific state
        if (state.screen === 'library') {
          libFilter = state.libFilter || 'all';
          libOpen   = state.libOpen   || null;
          libSearch = state.libSearch || '';
          buildLibrary();
          if (state.libOpen) {
            setTimeout(function() {
              var el = document.getElementById('exp-' + state.libOpen);
              if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
            }, 80);
          }
        } else if (state.screen === 'home')     { buildHome(); }
        else if (state.screen === 'quick')      { buildQuick(); }
        else if (state.screen === 'game')       { buildGame(); }
        else if (state.screen === 'deal')       { buildDeal(); }
        else if (state.screen === 'calc')       { buildCalc(); }
        else if (state.screen === 'blocks')     { buildBlocks(); }
        else if (state.screen === 'practice')   { buildPractice(); }
      }
    } finally {
      this.isPushing = false;
    }
  }
};

function navBack() { NAV.back(); }
function navFwd()  { NAV.fwd(); }

  html += '<div style="background:rgba(255,255,255,0.08);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Cap Rate</div><div style="font-size:13px;font-weight:700;color:#F5C842">' + current.capLow + '–' + current.capHigh + '%</div></div>';
  html += '<div style="background:rgba(255,255,255,0.08);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Vacancy</div><div style="font-size:13px;font-weight:700;color:#F5C842">' + current.vacancy + '%</div></div>';
  html += '<div style="background:rgba(255,255,255,0.08);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Expense Ratio</div><div style="font-size:13px;font-weight:700;color:#F5C842">' + current.expLow + '–' + current.expHigh + '%</div></div>';
  html += '<div style="background:rgba(255,255,255,0.08);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">DSCR Target</div><div style="font-size:13px;font-weight:700;color:#F5C842">' + current.dscrTarget + '</div></div>';
  html += '</div>';
  if (current.note) {
    html += '<div style="font-size:11px;color:rgba(245,240,232,0.55);margin-top:10px;line-height:1.5;font-style:italic">' + current.note + '</div>';
  }
  html += '</div>';

  // Market list
  html += '<div style="font-size:11px;font-weight:700;color:#777;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Change Market</div>';
  MARKETS.forEach(function(m) {
    var isSelected = m.id === current.id;
    html += "<div onclick=\"selectMarket('" + m.id + "')\" style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:" + (isSelected?"#FBF3E0":"#fff") + ";border:1px solid " + (isSelected?"#C9A84C":"#E2D9C8") + ";border-radius:8px;margin-bottom:6px;cursor:pointer\">";
    html += '<div><div style="font-size:14px;font-weight:' + (isSelected?'700':'500') + ';color:#1A1A1A">' + m.name + '</div>';
    html += '<div style="font-size:11px;color:#999;margin-top:1px">Cap ' + m.capLow + '–' + m.capHigh + '% · Vacancy ' + m.vacancy + '% · GRM ' + m.grmLow + '–' + m.grmHigh + 'x</div></div>';
    html += '<div style="font-size:18px">' + (isSelected?'✓':'') + '</div>';
    html += '</div>';
  });

  html += '</div>';
  sheet.innerHTML = html;
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });
}

function selectMarket(id) {
  MSTORE.set(id);
  // Rebuild settings panel with new selection
  var p = document.getElementById('settings-panel');
  if (p) p.remove();
  showSettingsPanel();
  // Rebuild home to update any market references
  if (currentScreen === 'home') buildHome();
}

  getMetric: function(id) {
    return this.metrics.find(function(m){ return m.id===id; });
  },

  buildQuestionPool: function(metricId) {
    var m = this.getMetric(metricId);
    if (!m) return [];
    var pool = [];

    // Q type 1: Which is the numerator
    pool.push({ type:'numiden', m:m });
    // Q type 2: Which is the denominator
    pool.push({ type:'deniden', m:m });
    // Q type 3: Why does numerator go on top
    pool.push({ type:'whynum', m:m });
    // Q type 4: Why does denominator go on bottom
    pool.push({ type:'whyden', m:m });
    // Q type 5: Scenario — identify numerator from real numbers
    m.scenarios.forEach(function(sc, i) {
      pool.push({ type:'scenario', m:m, sc:sc, idx:i });
    });
    // Q type 6: What does a low result mean
    pool.push({ type:'resultlow', m:m });
    // Q type 7: What does a high result mean
    pool.push({ type:'resulthigh', m:m });
    // Q type 8: Inverse name
    pool.push({ type:'inverse', m:m });
    // Q type 9: Where does numerator go in the inverse
    pool.push({ type:'flipnum', m:m });
    // Q type 10: Formula
    pool.push({ type:'formula', m:m });

    return pool;
  },

  nextQuestion: function() {
    if (!this.metric || !this.pool.length) return null;
    if (this.poolPos >= this.pool.length) {
      // Reshuffle
      this.pool = this.shuffle(this.pool);
      this.poolPos = 0;
    }
    return this.pool[this.poolPos++];
  },

  shuffle: function(arr) {
    var a = arr.slice();
    for (var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; }
    return a;
  },

  // Get wrong options drawn from other metrics
  otherComponents: function(excludeId) {
    var others = [];
    this.metrics.forEach(function(m) {
      if (m.id !== excludeId) {
        others.push(m.num);
        others.push(m.den);
      }
    });
    // Deduplicate
    var seen = {};
    return others.filter(function(x){ if(seen[x]) return false; seen[x]=true; return true; });
  },

  wrongOpts: function(correct, excludeId, count) {
    var pool = this.otherComponents(excludeId).filter(function(x){ return x !== correct; });
    this.shuffle(pool);
    return pool.slice(0, count);
  }
};

function selectDDMetric(id) {
  DD.metric = id;
