  DD.poolPos = 0;
  renderDDQuestion(document.getElementById('s-game'));
}

function renderDDQuestion(el) {
  var q = DD.nextQuestion();
  if (!q) { renderDDSelector(el); return; }
  GS.curScenario = q;

  var m = q.m;
  var hc = m.houseColor;

  var html = '<div style="padding:20px 16px">';
  html += scoreBar({metric:m.id, mode:'deepdive'});

  // Metric header
  html += '<div style="background:#F9F6F0;border:1px solid #E2D9C8;border-left:4px solid ' + hc + ';border-radius:10px;padding:12px 14px;margin-bottom:16px">';
  html += '<div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:' + hc + ';margin-bottom:4px">🎓 Formula Deep Dive · ' + m.house.toUpperCase() + ' HOUSE</div>';
  html += '<div style="font-size:16px;font-weight:700;color:#1A1A1A;margin-bottom:4px">' + m.name + '</div>';
  html += '<div style="font-family:DM Mono,monospace;font-size:13px;color:' + hc + '">' + m.formula + '</div>';
  html += '</div>';

  // Build question based on type
  if (q.type === 'numiden') {
    var opts = DD.shuffle([m.num].concat(DD.wrongOpts(m.num, m.id, 3)));
    html += '<div class="g-question">What is the <strong>numerator</strong> (top number) of ' + m.name + '?</div>';
    html += '<div style="background:#1C1812;border-radius:8px;padding:10px 14px;margin-bottom:14px;text-align:center;font-size:12px;color:#888">The top number <span style="color:#F5C842">answers</span> the question</div>';
    opts.forEach(function(o) {
      html += '<button class="g-btn" data-opt="' + o + '" onclick="gDDAnswer(this)">' + o + '</button>';
    });

  } else if (q.type === 'deniden') {
    var opts2 = DD.shuffle([m.den].concat(DD.wrongOpts(m.den, m.id, 3)));
    html += '<div class="g-question">What is the <strong>denominator</strong> (bottom number) of ' + m.name + '?</div>';
    html += '<div style="background:#1C1812;border-radius:8px;padding:10px 14px;margin-bottom:14px;text-align:center;font-size:12px;color:#888">The bottom number <span style="color:#F5C842">asks</span> the question</div>';
    opts2.forEach(function(o) {
      html += '<button class="g-btn" data-opt="' + o + '" onclick="gDDAnswer(this)">' + o + '</button>';
    });

  } else if (q.type === 'whynum') {
    var wrongReasons = [
      'Because it is always the larger number',
      'Because it measures the cost of the investment',
      'Because the lender requires it on top',
      'Because it is calculated first in the waterfall'
    ].filter(function(r){ return r !== m.whyNum; }).slice(0,3);
    var opts3 = DD.shuffle(['It is the result — what the property produced. The top always answers.'].concat(wrongReasons));
    html += '<div class="g-question">Why does <strong>' + m.num + '</strong> go on top in ' + m.name + '?</div>';
    opts3.forEach(function(o) {
      html += '<button class="g-btn" style="font-size:13px;text-align:left" data-opt="' + o + '" onclick="gDDAnswer(this)">' + o + '</button>';
    });

  } else if (q.type === 'whyden') {
    var wrongReasons2 = [
      'Because it is always the smaller number',
      'Because it measures the income the property produces',
      'Because the bank sets it at closing',
      'Because it appears later in the waterfall'
    ].filter(function(r){ return r !== m.whyden; }).slice(0,3);
    var opts4 = DD.shuffle(['It is the given — the measuring unit. The bottom always asks: given one of me.'].concat(wrongReasons2));
    html += '<div class="g-question">Why does <strong>' + m.den + '</strong> go on the bottom in ' + m.name + '?</div>';
    opts4.forEach(function(o) {
      html += '<button class="g-btn" style="font-size:13px;text-align:left" data-opt="' + o + '" onclick="gDDAnswer(this)">' + o + '</button>';
    });

  } else if (q.type === 'scenario') {
    var sc = q.sc;
    html += '<div style="background:#1C1812;border-radius:10px;padding:16px;margin-bottom:14px">';
    html += '<div style="font-size:11px;color:#888;margin-bottom:8px">Scenario</div>';
    html += '<div style="font-size:14px;color:#F5F0E8;line-height:1.65">' + sc.setup + '</div>';
    html += '</div>';
    html += '<div class="g-question">You are calculating <strong>' + m.name + '</strong>. Which number is the <strong>numerator</strong>?</div>';
    var numOpt = sc.num;
    var denOpt = sc.den;
    var wrongSc = DD.shuffle([m.numFull + ' and ' + m.denFull + ' are swapped', 'Neither — more information is needed']).slice(0,1);
    var scOpts = DD.shuffle([numOpt, denOpt].concat(wrongSc));
    scOpts.forEach(function(o) {
      html += '<button class="g-btn" style="font-size:13px;text-align:left" data-opt="' + o + '" onclick="gDDAnswer(this)">' + o + '</button>';
    });

  } else if (q.type === 'resultlow') {
    html += '<div class="g-question">A property shows a <strong>low</strong> ' + m.name + ' result. What does this signal to an investor?</div>';
    var lowOpts = DD.shuffle([
      m.resultLow,
      'The property is producing strong income relative to its cost',
      'The lender will immediately approve financing',
      'The investment is near its exit point'
    ]);
    lowOpts.forEach(function(o) {
      html += '<button class="g-btn" style="font-size:13px;text-align:left" data-opt="' + o + '" onclick="gDDAnswer(this)">' + o + '</button>';
    });

  } else if (q.type === 'resulthigh') {
    html += '<div class="g-question">A property shows a <strong>high</strong> ' + m.name + ' result. What does this signal to an investor?</div>';
    var highOpts = DD.shuffle([
      m.resultHigh,
      'The property has crossed into dangerous territory regardless of the metric',
      'The denominator must have been calculated incorrectly',
      'The investor should immediately refinance'
    ]);
    highOpts.forEach(function(o) {
      html += '<button class="g-btn" style="font-size:13px;text-align:left" data-opt="' + o + '" onclick="gDDAnswer(this)">' + o + '</button>';
    });

  } else if (q.type === 'inverse') {
    var allInverseNames = DD.metrics.map(function(mx){ return mx.inverseName; }).filter(function(n){ return n !== m.inverseName; });
    DD.shuffle(allInverseNames);
    var invOpts = DD.shuffle([m.inverseName].concat(allInverseNames.slice(0,3)));
    html += '<div class="g-question">What is the inverse of <strong>' + m.name + '</strong> called?</div>';
    html += '<div style="font-size:12px;color:#777;margin-bottom:12px">The inverse flips the fraction — numerator becomes denominator and vice versa.</div>';
    invOpts.forEach(function(o) {
      html += '<button class="g-btn" data-opt="' + o + '" onclick="gDDAnswer(this)">' + o + '</button>';
    });

  } else if (q.type === 'flipnum') {
    html += '<div class="g-question">In <strong>' + m.name + '</strong>, ' + m.num + ' is the numerator. In its inverse (<strong>' + m.inverseName + '</strong>), where does ' + m.num + ' go?</div>';
    var flipOpts = DD.shuffle([
      'It becomes the denominator — the fraction is flipped',
      'It stays on top as the numerator',
      'It is removed from the formula entirely',
      'It is divided by Annual Debt Service instead'
    ]);
    flipOpts.forEach(function(o) {
      html += '<button class="g-btn" style="font-size:13px;text-align:left" data-opt="' + o + '" onclick="gDDAnswer(this)">' + o + '</button>';
    });

  } else if (q.type === 'formula') {
    var allFormulas = DD.metrics.map(function(mx){ return mx.formula; }).filter(function(f){ return f !== m.formula; });
    DD.shuffle(allFormulas);
    var fOpts = DD.shuffle([m.formula].concat(allFormulas.slice(0,3)));

    fOpts.forEach(function(o) {
      html += '<button class="g-btn" style="font-family:DM Mono,monospace;font-size:13px" data-opt="' + o + '" onclick="gDDAnswer(this)">' + o + '</button>';
    });
  }

  html += '<div id="dd-explain" style="display:none" class="g-explanation"></div>';
  html += '<div style="margin-top:12px;text-align:center"><button onclick="DD.metric=null;renderDDSelector(document.getElementById(\'s-game\'))" style="background:none;border:none;font-size:12px;color:#999;cursor:pointer;font-family:DM Sans,sans-serif">↩ Switch metric</button></div>';
  html += '</div>';
  el.innerHTML = html;
}

function gDDAnswer(btn) {
  var q = GS.curScenario;
  if (!q) return;
  var el = document.getElementById('s-game');
  var choice = btn.dataset.opt;
  var m = q.m;
  var isCorrect = false;
  var explanation = '';
  var correctBtn = null;

  // Determine correct answer and explanation per question type
  if (q.type === 'numiden') {
    isCorrect = (choice === m.num);
    correctBtn = m.num;
    explanation = (isCorrect ? '✅ Correct! ' : '❌ The numerator is <strong>' + m.num + '</strong>. ') + m.whyNum + ' In the inverse (' + m.inverseName + '), ' + m.num + ' moves to the denominator.';

  } else if (q.type === 'deniden') {
    isCorrect = (choice === m.den);
    correctBtn = m.den;
    explanation = (isCorrect ? '✅ Correct! ' : '❌ The denominator is <strong>' + m.den + '</strong>. ') + m.whyDen + ' In the inverse (' + m.inverseName + '), ' + m.den + ' moves to the numerator.';

  } else if (q.type === 'whynum') {
    var correctWhy = 'It is the result — what the property produced. The top always answers.';
    isCorrect = (choice === correctWhy);
    correctBtn = correctWhy;
    explanation = (isCorrect ? '✅ Correct! ' : '❌ ') + m.whyNum;

  } else if (q.type === 'whyden') {
    var correctWhy2 = 'It is the given — the measuring unit. The bottom always asks: given one of me.';
    isCorrect = (choice === correctWhy2);
    correctBtn = correctWhy2;
    explanation = (isCorrect ? '✅ Correct! ' : '❌ ') + m.whyDen;

  } else if (q.type === 'scenario') {
    var sc = q.sc;
    isCorrect = (choice === sc.num);
    correctBtn = sc.num;
    explanation = (isCorrect ? '✅ Correct! ' : '❌ The numerator is <strong>' + sc.num + '</strong>. ') + m.whyNum + ' Result: ' + m.name + ' = ' + sc.result + '. ' + sc.meaning;

  } else if (q.type === 'resultlow') {
    isCorrect = (choice === m.resultLow);
    correctBtn = m.resultLow;
    explanation = (isCorrect ? '✅ Correct! ' : '❌ ') + m.resultLow;

  } else if (q.type === 'resulthigh') {
    isCorrect = (choice === m.resultHigh);
    correctBtn = m.resultHigh;
    explanation = (isCorrect ? '✅ Correct! ' : '❌ ') + m.resultHigh + ' Benchmark: ' + m.benchmark;

  } else if (q.type === 'inverse') {
    isCorrect = (choice === m.inverseName);
    correctBtn = m.inverseName;
    explanation = (isCorrect ? '✅ Correct! ' : '❌ The inverse of ' + m.name + ' is <strong>' + m.inverseName + '</strong>. ') + 'Formula: ' + m.inverseFormula + '. The Inversion Law: every inverse flips the fraction without exception. The numerator becomes the denominator and vice versa. The danger line stays at 1.';

  } else if (q.type === 'flipnum') {
    var correctFlip = 'It becomes the denominator — the fraction is flipped';
    isCorrect = (choice === correctFlip);
    correctBtn = correctFlip;
    explanation = (isCorrect ? '✅ Correct! ' : '❌ ') + 'The Inversion Law states that every inverse flips the fraction without exception. In ' + m.name + ', ' + m.num + ' is on top. In ' + m.inverseName + ', ' + m.num + ' moves to the bottom. ' + m.name + ' formula: ' + m.formula + '. ' + m.inverseName + ' formula: ' + m.inverseFormula + '.';

  } else if (q.type === 'formula') {
    isCorrect = (choice === m.formula);
    correctBtn = m.formula;
    explanation = (isCorrect ? '✅ Correct! ' : '❌ The formula is <strong>' + m.formula + '</strong>. ') + m.whyNum + ' ' + m.whyDen;
  }

  // Highlight buttons
  var allBtns = el.querySelectorAll('.g-btn');
  allBtns.forEach(function(b) {
    b.classList.add('disabled');
    if (b.dataset.opt === correctBtn) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');

  var exp = el.querySelector('#dd-explain');
  if (exp) { exp.style.display='block'; exp.innerHTML = explanation + ' +' + (10 + GS.streak*2) + ' pts'; }

  handleAnswer(el, isCorrect, '', 3000);
}

// MASTERY TEST SYSTEM
// 15 questions per metric, no repeats
// Pass = 12/15 (80%). Certifies the metric.

var MTEST = {
  KEY: 're-mtest-v1',
  get: function() {
    try { var r=localStorage.getItem(this.KEY); return r?JSON.parse(r):{}; }
    catch(e){ return {}; }
  },
  save: function(d) { try{localStorage.setItem(this.KEY,JSON.stringify(d));}catch(e){} },
  getCert: function(id) { var d=this.get(); return d[id]||null; },
  setCert: function(id, data) { var d=this.get(); d[id]=data; this.save(d); },
  isCertified: function(id) { var c=this.getCert(id); return c&&c.passed; },
  getCooldown: function(id) {
    var c=this.getCert(id);
    if(!c||c.passed) return 0;
    var elapsed=(Date.now()-c.timestamp)/1000/60; // minutes
    return Math.max(0, Math.ceil(30-elapsed));
  }
};

// Build all 15 questions for a metric using DD data
function buildMasteryQuestions(metricId) {
  var m = DD.getMetric(metricId);
  if (!m) return [];
  var qs = [];

  // Q1: Formula identification
  qs.push({ type:'formula', m:m });

  // Q2: Numerator identification
  qs.push({ type:'numiden', m:m });

  // Q3: Denominator identification
  qs.push({ type:'deniden', m:m });

  // Q4: Why numerator on top
  qs.push({ type:'whynum', m:m });

  // Q5: Why denominator on bottom
  qs.push({ type:'whyden', m:m });

  // Q6: Scenario A — identify numerator
  if (m.scenarios && m.scenarios[0]) {
    qs.push({ type:'scenario_num', m:m, sc:m.scenarios[0] });
  }

  // Q7: Scenario B — identify denominator
  if (m.scenarios && m.scenarios[1]) {
    qs.push({ type:'scenario_den', m:m, sc:m.scenarios[1] });
  } else if (m.scenarios && m.scenarios[0]) {
    qs.push({ type:'scenario_den', m:m, sc:m.scenarios[0] });
  }

  // Q8: Low result interpretation
  qs.push({ type:'resultlow', m:m });

  // Q9: High result interpretation
  qs.push({ type:'resulthigh', m:m });

  // Q10: Inverse name
  qs.push({ type:'inverse', m:m });

  // Q11: Flip detection
  qs.push({ type:'flipnum', m:m });

  // Q12: Benchmark identification (strong/weak/danger with a specific number)
  qs.push({ type:'benchmark', m:m });

  // Q13: House identification
  qs.push({ type:'house', m:m });

  // Q14: Waterfall connection
  qs.push({ type:'waterfall', m:m });

  // Q15: Inverse formula
  qs.push({ type:'invformula', m:m });

  return qs;
}

function startMasteryTest(metricId) {
  // Check cooldown
  var cd = MTEST.getCooldown(metricId);
  if (cd > 0) {
    alert('You can retake this test in ' + cd + ' minute' + (cd===1?'':'s') + '. Use this time to review the metric.');
    return;
  }
  MTState.metric = metricId;
  MTState.questions = buildMasteryQuestions(metricId);
  MTState.qIndex = 0;
  MTState.correct = 0;
  MTState.answers = [];
  MTState.startTime = Date.now();
  showScreen('practice');
  PR.mode = 'mastery_test';
  buildPractice();
}

  var m = q.m;

    var allF = DD.metrics.map(function(x){return x.formula;}).filter(function(f){return f!==m.formula;});

    html += '<div style="font-size:16px;font-weight:700;color:#1A1A1A;margin-bottom:16px">Which formula belongs to <strong>' + m.name + '</strong>?</div>';

  } else if (q.type === 'whyden') {

    var verdicts = DD.shuffle(['Strong','Weak','Danger zone']);
    if (verdicts.indexOf(bItem.verdict.charAt(0).toUpperCase()+bItem.verdict.slice(1))<0) verdicts[0]=bItem.verdict.charAt(0).toUpperCase()+bItem.verdict.slice(1);
    html += '<div style="background:#1C1812;border-radius:10px;padding:20px;text-align:center;margin-bottom:14px">';

function gMTAnswer(btn) {
  var q = MTState.questions[MTState.qIndex];
  var m = q.m;
  var choice = decodeURIComponent(btn.dataset.opt);
  var isCorrect = false;
  var correctOpt = '';
  var explanation = '';

  if (q.type === 'formula') {
    correctOpt = m.formula; isCorrect = (choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'The formula is <strong>'+correctOpt+'</strong>. ') + m.whyNum + ' ' + m.whyDen;

  } else if (q.type === 'numiden') {
    correctOpt = m.num; isCorrect = (choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'The numerator is <strong>'+correctOpt+'</strong>. ') + m.whyNum;

  } else if (q.type === 'deniden') {
    correctOpt = m.den; isCorrect = (choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'The denominator is <strong>'+correctOpt+'</strong>. ') + m.whyDen;

  } else if (q.type === 'whynum') {
    correctOpt = 'It is the result — what the property produced. The top always answers.'; isCorrect=(choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'') + m.whyNum;

  } else if (q.type === 'whyden') {
    correctOpt = 'It is the given — the measuring unit. The bottom always asks: given one of me.'; isCorrect=(choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'') + m.whyDen;

  } else if (q.type === 'scenario_num') {
    correctOpt = q.sc.num; isCorrect=(choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'The numerator is <strong>'+correctOpt+'</strong>. ') + m.whyNum + ' Result: ' + m.name + ' = ' + q.sc.result + '. ' + q.sc.meaning;

  } else if (q.type === 'scenario_den') {
    correctOpt = q.sc.den; isCorrect=(choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'The denominator is <strong>'+correctOpt+'</strong>. ') + m.whyDen + ' Result: ' + m.name + ' = ' + q.sc.result + '. ' + q.sc.meaning;

  } else if (q.type === 'resultlow') {
    correctOpt = m.resultLow; isCorrect=(choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'') + m.resultLow;

  } else if (q.type === 'resulthigh') {
    correctOpt = m.resultHigh; isCorrect=(choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'') + m.resultHigh + ' Benchmark: ' + m.benchmark;

  } else if (q.type === 'inverse') {
    correctOpt = m.inverseName; isCorrect=(choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'The inverse is <strong>'+correctOpt+'</strong>. ') + 'Formula: ' + m.inverseFormula + '. The Inversion Law flips the fraction — numerator becomes denominator and vice versa.';

  } else if (q.type === 'flipnum') {
    correctOpt = 'It becomes the denominator — the fraction is flipped'; isCorrect=(choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'') + 'The Inversion Law is absolute. In ' + m.name + ', ' + m.num + ' is on top. In ' + m.inverseName + ', ' + m.num + ' moves to the bottom. ' + m.name + ': ' + m.formula + '. ' + m.inverseName + ': ' + m.inverseFormula + '.';

  } else if (q.type === 'benchmark') {
    var bi = q.benchItem;
    var verdictMap = {'strong':'Strong','weak':'Weak','danger':'Danger zone'};
    correctOpt = verdictMap[bi.verdict]||'Strong'; isCorrect=(choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'The correct classification is <strong>'+correctOpt+'</strong>. ') + bi.explain + ' Benchmark: ' + m.benchmark;

  } else if (q.type === 'house') {
    var hNames = {'golden':'Golden House','green':'Green House','purple':'Purple House'};
    correctOpt = hNames[m.house]; isCorrect=(choice===correctOpt);
    var hLogic = {'golden':'Golden House — trigger word: out of. Part out of whole.','green':'Green House — trigger word: per. Two independent numbers connected by the property.','purple':'Purple House — two independent figures weighed against each other. One metric: DSCR.'};
    explanation = (isCorrect?'Correct. ':'') + hLogic[m.house];

  } else if (q.type === 'waterfall') {
    var wf2 = MT_WATERFALL[m.id];
    correctOpt = wf2 ? wf2.component : m.num; isCorrect=(choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'The answer is <strong>'+correctOpt+'</strong>. ') + (wf2?wf2.note:'This component feeds directly into the ' + m.name + ' calculation.');

  } else if (q.type === 'invformula') {
    correctOpt = m.inverseFormula; isCorrect=(choice===correctOpt);
    explanation = (isCorrect?'Correct. ':'The inverse formula is <strong>'+correctOpt+'</strong>. ') + 'The Inversion Law flips the fraction. ' + m.name + ' = ' + m.formula + '. ' + m.inverseName + ' = ' + m.inverseFormula + '.';
  }

  // Update state
  if (isCorrect) MTState.correct++;
  MTState.answers.push({ type:q.type, isCorrect:isCorrect, correct:correctOpt, chosen:choice });

  // Highlight buttons
  var el = document.getElementById('s-practice');
  var allBtns = el.querySelectorAll('.g-btn');
  allBtns.forEach(function(b) {
    b.classList.add('disabled');
    if (decodeURIComponent(b.dataset.opt) === correctOpt) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');

  // Show explanation
  var expEl = el.querySelector('#mt-explain');
  if (expEl) { expEl.style.display='block'; expEl.innerHTML=(isCorrect?'<span style="color:#166534;font-weight:700">✅ Correct.</span> ':'<span style="color:#991B1B;font-weight:700">❌</span> ')+explanation; }

  // Advance after delay
  setTimeout(function() {
    MTState.qIndex++;
    renderMasteryTest(document.getElementById('s-practice'));
    document.getElementById('screen-wrap').scrollTop=0;
  }, 3200);
}

function renderMTResults(el) {
  var m = DD.getMetric(MTState.metric);
  var correct = MTState.correct;
  var total = MTState.questions.length;
  var pct = Math.round((correct/total)*100);
  var passed = pct >= 80;
  var timeSec = Math.round((Date.now()-MTState.startTime)/1000);
  var timeMin = Math.floor(timeSec/60);
  var timeSecs = timeSec%60;

  // Save result
  MTEST.setCert(MTState.metric, {
    passed: passed,
    score: pct,
    correct: correct,
    total: total,
    timestamp: Date.now(),
    datePassed: passed ? new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : null
  });

  // If passed, update mastery level to mastered
  if (passed) {
    var d = STORE.get();
    if (!d.metrics) d.metrics = {};
    d.metrics[MTState.metric] = 1.0; // fully mastered
    STORE.save(d);
  }

  var hc = m ? m.houseColor : '#C9A84C';

  var html = '<div style="padding:24px 16px">';

  // Result card
  html += '<div style="background:' + (passed?'#1C1812':'#FEE2E2') + ';border:2px solid ' + (passed?hc:'#F87171') + ';border-radius:16px;padding:28px 20px;text-align:center;margin-bottom:20px">';
  html += '<div style="font-size:48px;margin-bottom:12px">' + (passed?'🎓':'📚') + '</div>';
  html += '<div style="font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:' + (passed?hc:'#991B1B') + ';margin-bottom:8px">' + (passed?'CERTIFIED':'NOT YET') + '</div>';
  html += '<div style="font-family:Playfair Display,serif;font-size:28px;font-weight:900;color:' + (passed?'#F5F0E8':'#991B1B') + ';margin-bottom:8px">' + pct + '%</div>';
  html += '<div style="font-size:14px;color:' + (passed?'rgba(245,240,232,0.7)':'#991B1B') + ';margin-bottom:16px">' + correct + ' of ' + total + ' correct · ' + timeMin + 'm ' + timeSecs + 's</div>';
  if (passed) {
    html += '<div style="font-size:13px;color:' + hc + ';font-weight:700">' + (m?m.name:'') + ' — Mastery Certified ✓</div>';
  } else {
    html += '<div style="font-size:13px;color:#991B1B">Pass mark is 80% (12 of 15 correct).<br>Review the missed questions and retake in 30 minutes.</div>';
  }
  html += '</div>';

  // Question breakdown
  html += '<div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#A67C2E;margin-bottom:8px">Question by Question</div>';
  var qLabels = ['Formula','Numerator','Denominator','Why numerator on top','Why denominator on bottom','Scenario A — numerator','Scenario B — denominator','Low result meaning','High result meaning','Inverse name','Flip detection','Benchmark call','House identification','Waterfall connection','Inverse formula'];
  MTState.answers.forEach(function(a, i) {
    html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F0EAE0">';
    html += '<span style="font-size:16px">' + (a.isCorrect?'✅':'❌') + '</span>';
    html += '<span style="font-size:12px;color:#444">' + (qLabels[i]||'Q'+(i+1)) + '</span>';
    html += '</div>';
  });

  // Actions
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px">';
  html += '<button onclick="PR.mode=\'menu\';buildPractice()" style="padding:12px;background:#F5F0E8;border:1px solid #E2D9C8;border-radius:10px;font-size:14px;font-weight:600;color:#777;cursor:pointer;font-family:DM Sans,sans-serif">← Practice</button>';
  if (!passed) {
    html += '<button onclick="startMasteryTest(\'' + MTState.metric + '\')" style="padding:12px;background:#1C1812;color:#F5C842;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:DM Sans,sans-serif">Retake (30 min)</button>';
  } else {
    html += '<button onclick="showScreen(\'home\')" style="padding:12px;background:#1C1812;color:#F5C842;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:DM Sans,sans-serif">View Certificates</button>';
  }
  html += '</div></div>';

  el.innerHTML = html;
}

buildHome();
buildLibrary();
buildCalc();
// Seed history with home screen
NAV.push({ screen:'home', libFilter:'all', libOpen:null, libSearch:'', scrollTop:0 });
buildBlocks();
buildPractice();
buildQuick();
buildGame();
// Show onboarding on first launch
(function(){ const d=STORE.get(); if(!d.onboardingSeen) showOnboarding(); })();
</script>
